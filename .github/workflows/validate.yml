name: Validate HTML

on:
  pull_request:
    paths:
      - 'html/**'
      - 'scripts/build_manifest.py'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        uses: nickersoft/html-validate-action@v1
        with:
          root: html/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build archive manifest (dry run)
        run: python scripts/build_manifest.py

      - name: Ensure manifest is valid JSON
        run: python -c "import json,sys; json.load(open('html/archive/manifest.json'))"
