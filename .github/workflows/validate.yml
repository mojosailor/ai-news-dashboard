name: Validate HTML

on:
  pull_request:
    paths:
      - 'html/**'
      - 'scripts/build_manifest.py'
      - '.github/workflows/validate.yml'
      - '.htmlvalidate.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate HTML
        run: npx --yes html-validate@8 "html/**/*.html"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build archive manifest (dry run)
        run: python scripts/build_manifest.py

      - name: Ensure manifest is valid JSON
        run: python -c "import json,sys; json.load(open('html/archive/manifest.json'))"
