<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Intel — Prevwind</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3149;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --groove: #22c55e;
    --groove-bg: rgba(34,197,94,0.10);
    --groove-border: rgba(34,197,94,0.30);
    --harmony: #818cf8;
    --harmony-bg: rgba(129,140,248,0.10);
    --harmony-border: rgba(129,140,248,0.30);
    --both: #38bdf8;
    --both-bg: rgba(56,189,248,0.10);
    --both-border: rgba(56,189,248,0.30);
    --enterprise: #fb923c;
    --enterprise-bg: rgba(251,146,60,0.10);
    --enterprise-border: rgba(251,146,60,0.30);
    --bonus: #f472b6;
    --bonus-bg: rgba(244,114,182,0.10);
    --bonus-border: rgba(244,114,182,0.30);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  #report-date {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Section labels ─────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Spotlights grid ────────────────────── */
  .spotlights {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #3e4265; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* pill variants */
  .pill-groove    { background: var(--groove-bg);     color: var(--groove);     border: 1px solid var(--groove-border); }
  .pill-harmony   { background: var(--harmony-bg);    color: var(--harmony);    border: 1px solid var(--harmony-border); }
  .pill-both      { background: var(--both-bg);       color: var(--both);       border: 1px solid var(--both-border); }
  .pill-enterprise{ background: var(--enterprise-bg); color: var(--enterprise); border: 1px solid var(--enterprise-border); }
  .pill-bonus     { background: var(--bonus-bg);      color: var(--bonus);      border: 1px solid var(--bonus-border); }

  /* spotlight card accent stripe */
  .card.spotlight-flux      { border-top: 3px solid var(--groove); }
  .card.spotlight-harmony   { border-top: 3px solid var(--harmony); }
  .card.spotlight-both      { border-top: 3px solid var(--both); }
  .card.spotlight-enterprise{ border-top: 3px solid var(--enterprise); }
  .card.spotlight-bonus     { border-top: 3px solid var(--bonus); }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: #b0b4cc;
    line-height: 1.65;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    gap: 8px;
  }

  .relevance {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .source-link:hover { color: var(--text); }
  .source-link svg { flex-shrink: 0; }

  /* ── More stories ───────────────────────── */
  .more-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  .story-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .story-item {
    background: var(--surface);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 12px;
    transition: background 0.12s;
  }

  .story-item:hover { background: var(--surface2); }

  .story-pill { margin-top: 2px; }

  .story-body { min-width: 0; }

  .story-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .story-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .story-source {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
    margin-top: 3px;
    transition: color 0.15s;
  }

  .story-source:hover { color: var(--text); }

  /* ── Empty / error states ───────────────── */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Daily AI Intel</h1>
    <span>Prevwind · Project Flux</span>
  </div>
  <div id="report-date"></div>
</header>

<!-- ── Spotlight section ──────────────────────── -->
<div class="section-label" style="max-width:1100px;margin:0 auto 12px;">Spotlights</div>
<div class="spotlights" id="spotlight-grid"></div>

<!-- ── More stories ──────────────────────────── -->
<div class="more-section">
  <div class="section-label">More Stories</div>
  <div class="story-list" id="story-list"></div>
</div>

<footer>
  <span>Auto-generated · Prevwind internal</span>
  <span id="footer-count"></span>
</footer>

<!-- ═══════════════════════════════════════════════
     DATA — edit this object to update the report
     ════════════════════════════════════════════ -->
<script>
/*
  TAG values:
    "groove"      → [GrooveGrid]
    "harmony"     → [HarmonyGrid]
    "both"        → [GrooveGrid + HarmonyGrid]
    "enterprise"  → General Enterprise
    "bonus"       → Bonus (rare 3rd spotlight, big-news days only)

  Set bonus:true on a spotlight to show it as the optional 3rd card.
  If bonus:true but you only want 2, simply remove the entry.
*/
const REPORT = {
  date: "2026-04-20",

  spotlights: [
    {
      tag: "groove",
      headline: "AI-Based HVAC Optimization Delivers 20–30% Savings with Sub-2-Year Payback",
      summary: "New commercial real estate case studies confirm AI-driven HVAC control cuts energy use by 20–30% in mixed-use buildings, with payback periods under 24 months. Predictive scheduling and occupancy-sensing are the primary levers — a direct match for GrooveGrid's positioning in small multi-tenant properties.",
      relevance: "Strong fit: GrooveGrid small-building HVAC module",
      sourceLabel: "extremenetworks.com",
      sourceUrl: "https://www.extremenetworks.com/resources/blogs/ai-that-saves-power-2026-field-guide",
    },
    {
      tag: "enterprise",
      headline: "Generative AI Customer Support Agents Now Deflect 40–60% of Tier-1 B2B Tickets",
      summary: "Enterprise SaaS vendors are deploying LLM-powered support copilots that resolve routine queries without human escalation, cutting support costs 30–45%. Internal knowledge-base grounding and structured escalation logic are emerging as the key differentiators.",
      relevance: "General enterprise trend — AI operations automation",
      sourceLabel: "claritusconsulting.com",
      sourceUrl: "https://claritusconsulting.com/insights-resources/blogs/ai-transformation-in-2026/",
    },
    /* Optional 3rd spotlight — set bonus:true and add your entry */
    /* Example:
    {
      tag: "bonus",
      bonus: true,
      headline: "Major VPP Platform Announces 500MW Aggregation Milestone",
      summary: "…",
      relevance: "HarmonyGrid grid-services layer",
      sourceLabel: "example.com",
      sourceUrl: "https://example.com",
    },
    */
  ],

  stories: [
    {
      tag: "harmony",
      title: "HEMS Startups Targeting Landlord SaaS Gap in Multi-Unit Buildings",
      summary: "Three Series-A HEMS startups are pitching property managers on whole-building demand-response enrollment, framing it as a new revenue line rather than a cost play.",
      sourceLabel: "linkedin.com",
      sourceUrl: "https://www.linkedin.com/pulse/6-high-roi-ai-use-cases-energy-tech-2026-hbmai-a3qbf",
    },
    {
      tag: "groove",
      title: "Predictive Maintenance AI Cuts Unplanned HVAC Downtime by 35% in Pilot",
      summary: "Property managers using ML-based anomaly detection on compressor telemetry report 35% fewer emergency callouts and a measurable lift in tenant satisfaction scores.",
      sourceLabel: "bfpminc.com",
      sourceUrl: "https://bfpminc.com/how-ai-and-automation-will-transform-property-management/",
    },
    {
      tag: "both",
      title: "EU Build-Up Hub Publishes AI Energy Management Playbook for Real Estate",
      summary: "The European Commission's Build-Up resource hub released a practical guide on AI for building energy management, covering HVAC, demand response, and compliance reporting — useful framing for HarmonyGrid's regulatory positioning.",
      sourceLabel: "build-up.ec.europa.eu",
      sourceUrl: "https://build-up.ec.europa.eu/en/resources-and-tools/publications/how-ai-improves-energy-efficiency-and-management-real-estate",
    },
    {
      tag: "groove",
      title: "KPMG: AI Real Estate Energy Tools Gaining Traction with Institutional Landlords",
      summary: "KPMG advisory note highlights accelerating adoption of AI energy dashboards among institutional real estate holders, driven by ESG reporting mandates and rising utility costs.",
      sourceLabel: "kpmg.com",
      sourceUrl: "https://kpmg.com/cy/en/insights/ai-and-technology/how-ai-is-helping-to-improve-energy-efficiency-and-management-in-real-estate.html",
    },
    {
      tag: "enterprise",
      title: "Itransition: Top AI Use-Case Clusters for Enterprise Software in 2026",
      summary: "Analyst roundup ranks process automation, intelligent document processing, and predictive analytics as the three highest-ROI enterprise AI categories heading into H2 2026.",
      sourceLabel: "itransition.com",
      sourceUrl: "https://www.itransition.com/ai/use-cases",
    },
  ],
};
// ────────────────────────────────────────────────────────────────────────────

/* ── Render helpers ─────────────────────────────────────────────────────── */
const TAG_META = {
  groove:     { label: "GrooveGrid",              pillClass: "pill-groove",     cardClass: "spotlight-flux" },
  harmony:    { label: "HarmonyGrid",             pillClass: "pill-harmony",    cardClass: "spotlight-harmony" },
  both:       { label: "GrooveGrid + HarmonyGrid",pillClass: "pill-both",       cardClass: "spotlight-both" },
  enterprise: { label: "Enterprise",              pillClass: "pill-enterprise", cardClass: "spotlight-enterprise" },
  bonus:      { label: "Bonus",                   pillClass: "pill-bonus",      cardClass: "spotlight-bonus" },
};

function pill(tag) {
  const m = TAG_META[tag] || TAG_META.enterprise;
  return `<span class="pill ${m.pillClass}">${m.label}</span>`;
}

function externalIcon() {
  return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`;
}

/* ── Date ──────────────────────────────────────────────────────────────── */
const d = new Date(REPORT.date + "T12:00:00");
const fmt = d.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
document.getElementById("report-date").textContent = fmt;

/* ── Spotlights ────────────────────────────────────────────────────────── */
const grid = document.getElementById("spotlight-grid");
const visibleSpotlights = REPORT.spotlights.filter((s, i) => {
  if (s.bonus) return true;   // bonus cards always show if present
  return i < 2;               // cap at 2 non-bonus spotlights
});

if (visibleSpotlights.length === 0) {
  grid.innerHTML = `<div class="empty">No spotlights for today.</div>`;
} else {
  visibleSpotlights.forEach(s => {
    const m = TAG_META[s.tag] || TAG_META.enterprise;
    grid.innerHTML += `
      <div class="card ${m.cardClass}">
        <div class="card-header">
          <h2>${s.headline}</h2>
          ${pill(s.tag)}
        </div>
        <p>${s.summary}</p>
        <div class="card-footer">
          <span class="relevance">${s.relevance || ""}</span>
          <a class="source-link" href="${s.sourceUrl}" target="_blank" rel="noopener">
            ${externalIcon()} ${s.sourceLabel}
          </a>
        </div>
      </div>`;
  });
}

/* ── Stories ───────────────────────────────────────────────────────────── */
const list = document.getElementById("story-list");
if (!REPORT.stories || REPORT.stories.length === 0) {
  list.innerHTML = `<div class="empty">No additional stories today.</div>`;
} else {
  REPORT.stories.forEach(s => {
    list.innerHTML += `
      <div class="story-item">
        <div class="story-pill">${pill(s.tag)}</div>
        <div class="story-body">
          <div class="story-title">${s.title}</div>
          <div class="story-summary">${s.summary}</div>
        </div>
        <a class="story-source" href="${s.sourceUrl}" target="_blank" rel="noopener">
          ${externalIcon()} ${s.sourceLabel}
        </a>
      </div>`;
  });
}

/* ── Footer count ──────────────────────────────────────────────────────── */
const total = visibleSpotlights.length + (REPORT.stories?.length || 0);
document.getElementById("footer-count").textContent =
  `${visibleSpotlights.length} spotlight${visibleSpotlights.length !== 1 ? "s" : ""} · ${REPORT.stories?.length || 0} stories`;
</script>
</body>
</html>
