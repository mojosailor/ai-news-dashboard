<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Intel — Prevwind</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3149;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --groove: #22c55e;
    --groove-bg: rgba(34,197,94,0.10);
    --groove-border: rgba(34,197,94,0.30);
    --harmony: #818cf8;
    --harmony-bg: rgba(129,140,248,0.10);
    --harmony-border: rgba(129,140,248,0.30);
    --both: #38bdf8;
    --both-bg: rgba(56,189,248,0.10);
    --both-border: rgba(56,189,248,0.30);
    --enterprise: #fb923c;
    --enterprise-bg: rgba(251,146,60,0.10);
    --enterprise-border: rgba(251,146,60,0.30);
    --bonus: #f472b6;
    --bonus-bg: rgba(244,114,182,0.10);
    --bonus-border: rgba(244,114,182,0.30);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .archive-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .archive-link:hover {
    color: var(--text);
    border-color: var(--both-border);
    background: var(--both-bg);
  }
  .archive-banner {
    margin: 12px 0 18px;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.86);
    font-size: 13px;
  }
  .archive-banner a {
    color: #9cd1ff;
    text-decoration: none;
  }
  .archive-banner a:hover {
    text-decoration: underline;
  }

  #report-date {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Section labels ─────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Spotlights grid ────────────────────── */
  .spotlights {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #3e4265; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* pill variants */
  .pill-groove    { background: var(--groove-bg);     color: var(--groove);     border: 1px solid var(--groove-border); }
  .pill-harmony   { background: var(--harmony-bg);    color: var(--harmony);    border: 1px solid var(--harmony-border); }
  .pill-both      { background: var(--both-bg);       color: var(--both);       border: 1px solid var(--both-border); }
  .pill-enterprise{ background: var(--enterprise-bg); color: var(--enterprise); border: 1px solid var(--enterprise-border); }
  .pill-bonus     { background: var(--bonus-bg);      color: var(--bonus);      border: 1px solid var(--bonus-border); }

  /* spotlight card accent stripe */
  .card.spotlight-flux      { border-top: 3px solid var(--groove); }
  .card.spotlight-harmony   { border-top: 3px solid var(--harmony); }
  .card.spotlight-both      { border-top: 3px solid var(--both); }
  .card.spotlight-enterprise{ border-top: 3px solid var(--enterprise); }
  .card.spotlight-bonus     { border-top: 3px solid var(--bonus); }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: #b0b4cc;
    line-height: 1.65;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    gap: 8px;
  }

  .relevance {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .source-link:hover { color: var(--text); }
  .source-link svg { flex-shrink: 0; }

  /* ── More stories ───────────────────────── */
  .more-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  .story-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .story-item {
    background: var(--surface);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 12px;
    transition: background 0.12s;
  }

  .story-item:hover { background: var(--surface2); }

  .story-pill { margin-top: 2px; }

  .story-body { min-width: 0; }

  .story-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .story-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .story-source {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
    margin-top: 3px;
    transition: color 0.15s;
  }

  .story-source:hover { color: var(--text); }

  /* ── Empty / error states ───────────────── */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* render-fix v1 bullets css */
  .card .bullets {
    list-style: disc;
    padding-left: 18px;
    margin: 0;
    color: #b0b4cc;
    font-size: 13px;
    line-height: 1.65;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card .bullets li {
    margin-left: 0;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Daily AI Intel</h1>
    <span>Prevwind · Project Flux</span>
  </div>
  <div class="header-right">
    <a class="archive-link" href="archive/" title="Browse prior days">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      Archive
    </a>
    <div id="report-date"></div>
  </div>
</header>

  <div class="archive-banner">
    You're viewing an archived edition.
    <a href="../">Go to latest</a> or <a href="index.html">browse the archive</a>.
  </div>

<!-- ── Spotlight section ──────────────────────── -->
<div class="section-label" style="max-width:1100px;margin:0 auto 12px;">Spotlights</div>
<div class="spotlights" id="spotlight-grid"></div>

<!-- ── More stories ──────────────────────────── -->
<div class="more-section">
  <div class="section-label">More Stories</div>
  <div class="story-list" id="story-list"></div>
</div>

<footer>
  <span>Auto-generated · Prevwind internal</span>
  <span id="footer-count"></span>
</footer>

<!-- ═══════════════════════════════════════════════
     DATA — edit this object to update the report
     ════════════════════════════════════════════ -->
<script>
const REPORT = {
  date: "2026-04-28",

  spotlights: [
    {
      tag: "harmony",
      headline: "Voltus + Octopus partner on 'bring-your-own-capacity' VPPs — a template for turning distributed devices into a data-center-era capacity product",
      summary: "Voltus (historically C&I demand response) announced a partnership with Octopus Energy U.S. to source aggregations of residential devices in markets like PJM, MISO, New York, and California — extending Voltus’ VPP playbook into 'bring-your-own-capacity' offerings aimed at fast, modular capacity in constrained regions.",
      relevance: "HarmonyGrid pilot pattern: package flexible load as a repeatable 'capacity SKU' that can be contracted ahead of time (not just called in emergencies). Next pilot: pick one asset class (multifamily HVAC, EV charging, water heating) and prove (1) dispatchability, (2) M&V you can defend, and (3) enrollment + retention at scale.",
      sourceLabel: "Latitude Media",
      sourceUrl: "https://www.latitudemedia.com/news/voltus-launches-bring-your-own-capacity-partnership-with-octopus/",
    },
    {
      tag: "enterprise",
      headline: "Google Cloud rolls out agent governance primitives: Agent Identity + Agent Gateway for policy enforcement across agent-to-agent and agent-to-tool traffic",
      summary: "Google Cloud announced Agent Identity (unique identities for agents with scoped delegation) and Agent Gateway (policy enforcement that understands agent protocols like MCP and Agent2Agent) as part of its Gemini Enterprise Agent Platform security stack, positioning governance as a first-class requirement for enterprise agent deployments.",
      relevance: "Enterprise pilot pattern: treat agents like non-human identities with lifecycle, least-privilege permissions, and inspectable traffic. What to pilot next: register 2–3 internal agents, issue unique IDs, enforce allow-listed tools, and log every tool call through a gateway before you scale agent count.",
      sourceLabel: "Google Cloud",
      sourceUrl: "https://cloud.google.com/blog/products/identity-security/next26-redefining-security-for-the-ai-era-with-google-cloud-and-wiz",
    },
    {
      tag: "harmony",
      bonus: true,
      headline: "Self-hosting gets smoother: LM Studio 0.4.12 adds Qwen 3.6 support and fixes MCP OAuth issues on Windows",
      summary: "LM Studio 0.4.12 shipped with explicit support for Qwen 3.6 and a fix for MCP servers that use OAuth on some Windows environments — a small but meaningful step for teams standardizing local inference + tool-using workflows.",
      relevance: "HarmonyGrid self-hosting angle: better desktop tooling lowers the barrier to running open-weight models for on-prem workflows (docs, support, local RAG) without sending data to a hosted API. Pilot ask: pick one workflow and validate offline performance + model governance.",
      sourceLabel: "LM Studio",
      sourceUrl: "https://lmstudio.ai/changelog/lmstudio-v0.4.12",
    },
    {
      tag: "groove",
      bonus: true,
      headline: "AI property ops keeps productizing: Braiin launches an AI-powered property management platform spanning listings, screening, inspections, maintenance, and reconciliation",
      summary: "Braiin (Nasdaq: BRAI) announced deployment of an AI-powered property management platform designed to unify and automate listings, tenant screening, inspections, maintenance workflows, and financial management for rental portfolios.",
      relevance: "GrooveGrid relevance: the 'property manager OS' is shifting from siloed tools to end-to-end automation with AI doing the glue work. What to pilot next: measure where AI reduces staff time (leasing inbox triage, work-order details capture, reconciliation) and validate integrations with your system of record.",
      sourceLabel: "Stock Titan",
      sourceUrl: "https://www.stocktitan.net/news/BRAI/braiin-announces-launch-of-advanced-ai-powered-property-management-ohg0lrus945k.html",
    },
  ],

  stories: [
    {
      tag: "enterprise",
      title: "Enterprise agent governance: Google positions Agent Identity + Agent Gateway as the core control plane for agent sprawl",
      summary: "Google Cloud frames governance as table stakes for enterprises building 'agentic task forces', introducing Agent Identity (unique IDs + scoped delegation) and Agent Gateway (policy enforcement for agent-to-agent and agent-to-tool connections).",
      sourceLabel: "Google Cloud",
      sourceUrl: "https://cloud.google.com/blog/products/identity-security/next26-redefining-security-for-the-ai-era-with-google-cloud-and-wiz",
    },
    {
      tag: "harmony",
      title: "Energy + AI infra: the VPP industry is explicitly tying flexibility to the AI buildout (data centers) and capacity-constrained regions",
      summary: "Latitude Media notes Voltus has been leaning into VPPs as a tool to enable the AI buildout, and the Octopus partnership expands where Voltus can source distributed-device megawatts.",
      sourceLabel: "Latitude Media",
      sourceUrl: "https://www.latitudemedia.com/news/voltus-launches-bring-your-own-capacity-partnership-with-octopus/",
    },
    {
      tag: "harmony",
      title: "Self-hosting: LM Studio 0.4.12 adds Qwen 3.6 support and improves compatibility with OpenAI/Anthropic-style endpoints",
      summary: "LM Studio’s 0.4.12 changelog calls out support for Qwen 3.6, improved Qwen 3.5 performance with OpenAI-compatible endpoints, and an MCP OAuth fix on some Windows environments.",
      sourceLabel: "LM Studio",
      sourceUrl: "https://lmstudio.ai/changelog/lmstudio-v0.4.12",
    },
    {
      tag: "groove",
      title: "Real estate search: Zillow launches 'AI mode' assistant to answer listing + market questions (with a Fair Housing guardrail)",
      summary: "Inman reports Zillow released 'AI mode' (beta) to help buyers/renters ask questions, compare listings, analyze affordability, and schedule tours, with a Fair Housing Classifier integrated as a real-time guardrail.",
      sourceLabel: "Inman",
      sourceUrl: "https://www.inman.com/2026/03/25/zillow-goes-ai-mode-with-new-home-search-assistant/",
    },
    {
      tag: "bonus",
      title: "Creator tools: ElevenLabs launches ElevenMusic iOS app for prompt-to-song generation and discovery",
      summary: "TechCrunch reports ElevenLabs released an iOS app (ElevenMusic) that lets users generate up to seven songs per day from prompts and remix others’ tracks.",
      sourceLabel: "TechCrunch",
      sourceUrl: "https://techcrunch.com/2026/04/02/elevenlabs-releases-a-new-ai-powered-music-generation-app/",
    },
    {
      tag: "bonus",
      title: "Creator tools: 2026 video models keep iterating on realism + continuity (Seedance 2.0, Kling 3.0, Veo, Sora)",
      summary: "Magic Hour’s 2026 tracker highlights confirmed updates including Seedance 2.0 (longer, more cinematic sequences), Kling 3.0 (better physics and human motion stability), Veo updates (prompt interpretation + quality), and Sora improvements (narrative continuity and scene transitions).",
      sourceLabel: "Magic Hour",
      sourceUrl: "https://magichour.ai/blog/ai-video-model-release-tracker-2026",
    },
  ],
};

/* render-fix v1 — TAG_META + bullets */
const TAG_META = {
  groove:     { label: 'GrooveGrid',              pillClass: 'pill-groove',     cardClass: 'spotlight-flux'      },
  harmony:    { label: 'HarmonyGrid',             pillClass: 'pill-harmony',    cardClass: 'spotlight-harmony'   },
  both:       { label: 'GrooveGrid + HarmonyGrid',pillClass: 'pill-both',       cardClass: 'spotlight-both'      },
  enterprise: { label: 'Enterprise',              pillClass: 'pill-enterprise', cardClass: 'spotlight-enterprise'},
  bonus:      { label: 'Bonus',                   pillClass: 'pill-bonus',      cardClass: 'spotlight-bonus'     }
};

function escapeHTML(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function pill(tag) {
  const m = TAG_META[tag] || TAG_META.enterprise;
  return `<span class="pill ${m.pillClass}">${escapeHTML(m.label)}</span>`;
}

function externalIcon() {
  return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`;
}

/* ── Date ──────────────────────────────────────────────────────────────── */
(function () {
  try {
    const d = new Date(REPORT.date + 'T12:00:00');
    const fmt = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const el = document.getElementById('report-date');
    if (el) el.textContent = fmt;
  } catch (e) { /* non-fatal */ }
})();

/* ── Spotlights ────────────────────────────────────────────────────────── */
const spotlightsAll = (REPORT && Array.isArray(REPORT.spotlights)) ? REPORT.spotlights : [];
const visibleSpotlights = spotlightsAll.filter((s, i) => {
  if (s && s.bonus) return true;
  return i < 4;  // safety cap; matches README 'hard cap 4'
});

function spotlightCard(s) {
  const m = TAG_META[s.tag] || TAG_META.enterprise;
  const heading = escapeHTML(s.title || s.headline || '(untitled)');
  const bulletsArr = Array.isArray(s.bullets) ? s.bullets : (s.summary ? [s.summary] : []);
  const bulletsHTML = bulletsArr.length
    ? `<ul class="bullets">${bulletsArr.map(b => `<li>${escapeHTML(b)}</li>`).join('')}</ul>`
    : '';
  const sourceLabel = escapeHTML(s.sourceLabel || 'Source');
  const sourceUrl   = String(s.sourceUrl || '#');
  return `
    <div class="card ${m.cardClass}">
      <div class="card-header">
        <h2>${heading}</h2>
        ${pill(s.tag)}
      </div>
      ${bulletsHTML}
      <div class="card-footer">
        <span class="relevance">${escapeHTML(s.relevance || '')}</span>
        <a class="source-link" href="${sourceUrl}" target="_blank" rel="noopener">
          ${externalIcon()} ${sourceLabel}
        </a>
      </div>
    </div>`;
}

(function () {
  const grid = document.getElementById('spotlight-grid');
  if (!grid) return;
  if (visibleSpotlights.length === 0) {
    grid.innerHTML = `<div class="empty">No spotlights for today.</div>`;
  } else {
    grid.innerHTML = visibleSpotlights.map(spotlightCard).join('');
  }
})();

/* ── Stories ───────────────────────────────────────────────────────────── */
function storyRow(s) {
  const title = escapeHTML(s.title || s.headline || '(untitled)');
  const summary = escapeHTML(s.summary || '');
  const sourceLabel = escapeHTML(s.sourceLabel || 'Source');
  const sourceUrl   = String(s.sourceUrl || '#');
  const summaryHTML = summary ? `<div class="story-summary">${summary}</div>` : '';
  return `
    <div class="story-item">
      <div class="story-pill">${pill(s.tag)}</div>
      <div class="story-body">
        <div class="story-title">${title}</div>
        ${summaryHTML}
      </div>
      <a class="story-source" href="${sourceUrl}" target="_blank" rel="noopener">
        ${externalIcon()} ${sourceLabel}
      </a>
    </div>`;
}

(function () {
  const list = document.getElementById('story-list');
  if (!list) return;
  const stories = (REPORT && Array.isArray(REPORT.stories)) ? REPORT.stories : [];
  if (stories.length === 0) {
    list.innerHTML = `<div class="empty">No additional stories today.</div>`;
  } else {
    list.innerHTML = stories.map(storyRow).join('');
  }
})();

/* ── Footer count ──────────────────────────────────────────────────────── */
(function () {
  const el = document.getElementById('footer-count');
  if (!el) return;
  const s = visibleSpotlights.length;
  const t = (REPORT && Array.isArray(REPORT.stories)) ? REPORT.stories.length : 0;
  el.textContent = `${s} spotlight${s !== 1 ? 's' : ''} · ${t} stories`;
})();
</script>
</body>
</html>
