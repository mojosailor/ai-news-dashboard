<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Intel — Prevwind</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3149;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --groove: #22c55e;
    --groove-bg: rgba(34,197,94,0.10);
    --groove-border: rgba(34,197,94,0.30);
    --harmony: #818cf8;
    --harmony-bg: rgba(129,140,248,0.10);
    --harmony-border: rgba(129,140,248,0.30);
    --both: #38bdf8;
    --both-bg: rgba(56,189,248,0.10);
    --both-border: rgba(56,189,248,0.30);
    --enterprise: #fb923c;
    --enterprise-bg: rgba(251,146,60,0.10);
    --enterprise-border: rgba(251,146,60,0.30);
    --bonus: #f472b6;
    --bonus-bg: rgba(244,114,182,0.10);
    --bonus-border: rgba(244,114,182,0.30);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .archive-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .archive-link:hover {
    color: var(--text);
    border-color: var(--both-border);
    background: var(--both-bg);
  }
  .archive-banner {
    max-width: 1100px;
    margin: -8px auto 20px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--bonus);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
  }
  #report-date {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Section labels ─────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Spotlights grid ────────────────────── */
  .spotlights {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #3e4265; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* pill variants */
  .pill-groove    { background: var(--groove-bg);     color: var(--groove);     border: 1px solid var(--groove-border); }
  .pill-harmony   { background: var(--harmony-bg);    color: var(--harmony);    border: 1px solid var(--harmony-border); }
  .pill-both      { background: var(--both-bg);       color: var(--both);       border: 1px solid var(--both-border); }
  .pill-enterprise{ background: var(--enterprise-bg); color: var(--enterprise); border: 1px solid var(--enterprise-border); }
  .pill-bonus     { background: var(--bonus-bg);      color: var(--bonus);      border: 1px solid var(--bonus-border); }

  /* spotlight card accent stripe */
  .card.spotlight-flux      { border-top: 3px solid var(--groove); }
  .card.spotlight-harmony   { border-top: 3px solid var(--harmony); }
  .card.spotlight-both      { border-top: 3px solid var(--both); }
  .card.spotlight-enterprise{ border-top: 3px solid var(--enterprise); }
  .card.spotlight-bonus     { border-top: 3px solid var(--bonus); }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: #b0b4cc;
    line-height: 1.65;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    gap: 8px;
  }

  .relevance {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .source-link:hover { color: var(--text); }
  .source-link svg { flex-shrink: 0; }

  /* ── More stories ───────────────────────── */
  .more-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  .story-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .story-item {
    background: var(--surface);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 12px;
    transition: background 0.12s;
  }

  .story-item:hover { background: var(--surface2); }

  .story-pill { margin-top: 2px; }

  .story-body { min-width: 0; }

  .story-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .story-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .story-source {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
    margin-top: 3px;
    transition: color 0.15s;
  }

  .story-source:hover { color: var(--text); }

  /* ── Empty / error states ───────────────── */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Daily AI Intel</h1>
    <span>Prevwind · Project Flux · Archived</span>
  </div>
  <div class="header-right">
    <a class="archive-link" href="../" title="Back to latest">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Latest
    </a>
    <a class="archive-link" href="index.html" title="Browse archive">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      Archive
    </a>
    <div id="report-date"></div>
  </div>
</header>

<div class="archive-banner">
  Viewing archived report. <a href="../" style="color:var(--both)">Go to today's dashboard</a> or <a href="index.html" style="color:var(--both)">browse all archives</a>.
</div>

<!-- ── Spotlight section ──────────────────────── -->
<div class="section-label" style="max-width:1100px;margin:0 auto 12px;">Spotlights</div>
<div class="spotlights" id="spotlight-grid"></div>

<!-- ── More stories ──────────────────────────── -->
<div class="more-section">
  <div class="section-label">More Stories</div>
  <div class="story-list" id="story-list"></div>
</div>

<footer>
  <span>Auto-generated · Prevwind internal</span>
  <span id="footer-count"></span>
</footer>

<!-- ═══════════════════════════════════════════════
     DATA — edit this object to update the report
     ════════════════════════════════════════════ -->
<script>
/*
  TAG values:
    "groove"      → [GrooveGrid]
    "harmony"     → [HarmonyGrid]
    "both"        → [GrooveGrid + HarmonyGrid]
    "enterprise"  → General Enterprise
    "bonus"       → Bonus (rare 3rd spotlight, big-news days only)

  Set bonus:true on a spotlight to show it as the optional 3rd card.
  If bonus:true but you only want 2, simply remove the entry.
*/
const REPORT = {
  date: "2026-04-24",

  spotlights: [
    {
      tag: "harmony",
      headline: "Grid-edge DER orchestration: ev.energy + Sense partner to scale household-level VPP dispatch via AMI waveform AI",
      summary: "ev.energy and Sense announced a partnership to combine Sense’s meter-level Waveform AI detection with ev.energy’s DER orchestration platform, aiming to enable household-by-household dispatch and verification at scale through AMI feeds.",
      relevance: "HarmonyGrid angle: AMI-as-truth-source tightens measurement & verification for DR/VPP programs (fewer ‘ghost’ assets when cloud telemetry drops). Pilot idea: market ‘meter-verified flexibility’ to utilities with OpenADR/VEN stacks and to aggregators onboarding large multifamily portfolios.",
      sourceLabel: "EIN Presswire",
      sourceUrl: "https://www.einpresswire.com/article/906975456/ev-energy-and-sense-partner-to-deliver-household-level-der-orchestration-at-scale-from-the-grid-edge",
    },
    {
      tag: "enterprise",
      headline: "Agent governance shifts from policy PDFs to controls: treat AI agents as first-class identities with kill switches + JIT access",
      summary: "Multiple enterprise governance takes converged this month on the same pattern: classify agents by autonomy, assign a human owner, grant just-in-time permissions, and maintain centralized kill switches and tamper-evident logs for tool calls.",
      relevance: "Enterprise pattern: if you’re piloting agentic automation (IT ops, finance ops, support triage), the fastest way to get audit-ready is to extend IAM to non-human ‘agent principals’ plus end-to-end trace IDs and retention. This becomes the ‘governance seam’ between an agent framework and production systems.",
      sourceLabel: "Built In",
      sourceUrl: "https://builtin.com/articles/enterprise-identity-access-management",
    },
    {
      tag: "enterprise",
      bonus: true,
      headline: "Identity security vendors move into agent control planes: Saviynt ships Identity Security for AI (agent discovery + runtime authorization)",
      summary: "Saviynt announced an ‘Identity Security for AI’ offering positioned as a control plane for discovering autonomous agents, governing their lifecycle, and enforcing authorization in real time.",
      relevance: "Bonus because it’s vendor messaging, but useful as a market signal: identity and PAM vendors are treating agents as a new non-human identity class. Expect RFP language to shift from ‘model risk’ to ‘agent inventory + access reviews + runtime enforcement’.",
      sourceLabel: "Saviynt",
      sourceUrl: "https://saviynt.com/press-release/saviynt-identity-security-for-ai-agent-governance",
    },
    {
      tag: "bonus",
      bonus: true,
      headline: "Creator tools: ElevenLabs launches ElevenMusic (iOS) with a free tier (7 songs/day) to compete with Suno/Udio",
      summary: "ElevenLabs released an iOS app called ElevenMusic for prompt-to-music creation and discovery, offering a free tier that allows users to generate up to seven songs per day.",
      relevance: "Bonus spotlight because it’s a clear product move: audio-first AI vendors are expanding into full creator suites (music + remix + discovery). This is the ‘consumer funnel’ version of enterprise agent platforms.",
      sourceLabel: "TechCrunch",
      sourceUrl: "https://techcrunch.com/2026/04/02/elevenlabs-releases-a-new-ai-powered-music-generation-app/",
    },
  ],

  stories: [
    {
      tag: "harmony",
      title: "Grid orchestration trend watch: utilities push toward AI-driven asset intelligence + automation as DER volumes rise",
      summary: "GE Vernova outlined 2026 grid orchestration trends including AI-driven asset intelligence workflows that prioritize risk and automate work assignment for utility operations teams.",
      sourceLabel: "GE Vernova",
      sourceUrl: "https://www.gevernova.com/software/blog/grid-orchestration-trends-2026",
    },
    {
      tag: "enterprise",
      title: "EU AI Act logging: why agent tool-call traces need tamper-evidence, retention policy, and deployer documentation",
      summary: "Help Net Security highlighted AI Act expectations around logging (including operational monitoring and post-market monitoring) and the practical need for logs that can demonstrate they weren’t modified.",
      sourceLabel: "Help Net Security",
      sourceUrl: "https://www.helpnetsecurity.com/2026/04/16/eu-ai-act-logging-requirements/",
    },
    {
      tag: "harmony",
      title: "Self-hosting watch: April 2026 open-weights wave (Qwen 3, Gemma 4, Llama 4, Mistral Medium 3, DeepSeek R2) raises the floor for local agents",
      summary: "A mid-April recap of April’s major open-weight releases argued that ‘tool-call reliability’ and structured output matter as much as benchmark scores when running real agent loops locally.",
      sourceLabel: "Fazm",
      sourceUrl: "https://fazm.ai/t/open-source-llm-release-april-2026",
    },
    {
      tag: "enterprise",
      title: "Local inference plumbing: Ollama’s roadmap emphasizes structured outputs + OpenAI-compatible APIs for swapping local/cloud backends",
      summary: "Ollama’s blog highlights structured outputs support and OpenAI API compatibility as key building blocks for reliable local tool-calling and easier migration paths.",
      sourceLabel: "Ollama",
      sourceUrl: "https://ollama.com/blog",
    },
    {
      tag: "groove",
      title: "Property management AI: Buildium highlights embedded ‘Lumina AI’ workflows across accounting, leasing, maintenance, and comms",
      summary: "Buildium’s 2026 roundup describes AI features embedded directly into property management workflows (e.g., bill extraction and message drafting) rather than standalone chatbots.",
      sourceLabel: "Buildium",
      sourceUrl: "https://www.buildium.com/blog/best-ai-property-management-tools/",
    },
    {
      tag: "groove",
      title: "Multifamily ops analytics: Rentana frames ‘AI real estate assistants’ as decision-support for leasing velocity, pricing signals, renewals, and exposure risk",
      summary: "Rentana’s guide positions AI assistants as tools that surface early leasing momentum changes and explain pricing recommendations, helping operators move from reporting to action.",
      sourceLabel: "Rentana",
      sourceUrl: "https://www.rentana.io/blog/ai-real-estate-assistant",
    },
    {
      tag: "bonus",
      title: "AI video comparison: Seedance 2.0 vs Veo 3.1 vs Kling — creators optimize for workflow pipelines, not just raw realism",
      summary: "A late-April guide compared major video models and noted Veo 3.1’s positioning around cinematic output and integrated audio generation.",
      sourceLabel: "Atlas Cloud",
      sourceUrl: "https://www.atlascloud.ai/blog/guides/best-ai-video-generation-models-2026",
    },
  ],
};
// ────────────────────────────────────────────────────────────────────────────

/* ── Render helpers ─────────────────────────────────────────────────────── */
const TAG_META = {
  groove:     { label: "GrooveGrid",              pillClass: "pill-groove",     cardClass: "spotlight-flux" },
  harmony:    { label: "HarmonyGrid",             pillClass: "pill-harmony",    cardClass: "spotlight-harmony" },
  both:       { label: "GrooveGrid + HarmonyGrid",pillClass: "pill-both",       cardClass: "spotlight-both" },
  enterprise: { label: "Enterprise",              pillClass: "pill-enterprise", cardClass: "spotlight-enterprise" },
  bonus:      { label: "Bonus",                   pillClass: "pill-bonus",      cardClass: "spotlight-bonus" },
};

function pill(tag) {
  const m = TAG_META[tag] || TAG_META.enterprise;
  return `<span class="pill ${m.pillClass}">${m.label}</span>`;
}

function externalIcon() {
  return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`;
}

/* ── Date ──────────────────────────────────────────────────────────────── */
const d = new Date(REPORT.date + "T12:00:00");
const fmt = d.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
document.getElementById("report-date").textContent = fmt;

/* ── Spotlights ────────────────────────────────────────────────────────── */
const grid = document.getElementById("spotlight-grid");
const visibleSpotlights = REPORT.spotlights.filter((s, i) => {
  if (s.bonus) return true;   // bonus cards always show if present
  return i < 2;               // cap at 2 non-bonus spotlights
});

if (visibleSpotlights.length === 0) {
  grid.innerHTML = `<div class="empty">No spotlights for today.</div>`;
} else {
  visibleSpotlights.forEach(s => {
    const m = TAG_META[s.tag] || TAG_META.enterprise;
    grid.innerHTML += `
      <div class="card ${m.cardClass}">
        <div class="card-header">
          <h2>${s.headline}</h2>
          ${pill(s.tag)}
        </div>
        <p>${s.summary}</p>
        <div class="card-footer">
          <span class="relevance">${s.relevance || ""}</span>
          <a class="source-link" href="${s.sourceUrl}" target="_blank" rel="noopener">
            ${externalIcon()} ${s.sourceLabel}
          </a>
        </div>
      </div>`;
  });
}

/* ── Stories ───────────────────────────────────────────────────────────── */
const list = document.getElementById("story-list");
if (!REPORT.stories || REPORT.stories.length === 0) {
  list.innerHTML = `<div class="empty">No additional stories today.</div>`;
} else {
  REPORT.stories.forEach(s => {
    list.innerHTML += `
      <div class="story-item">
        <div class="story-pill">${pill(s.tag)}</div>
        <div class="story-body">
          <div class="story-title">${s.title}</div>
          <div class="story-summary">${s.summary}</div>
        </div>
        <a class="story-source" href="${s.sourceUrl}" target="_blank" rel="noopener">
          ${externalIcon()} ${s.sourceLabel}
        </a>
      </div>`;
  });
}

/* ── Footer count ──────────────────────────────────────────────────────── */
const total = visibleSpotlights.length + (REPORT.stories?.length || 0);
document.getElementById("footer-count").textContent =
  `${visibleSpotlights.length} spotlight${visibleSpotlights.length !== 1 ? "s" : ""} · ${REPORT.stories?.length || 0} stories`;
</script>
</body>
</html>
