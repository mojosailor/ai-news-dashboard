<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Intel — Prevwind</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3149;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --groove: #22c55e;
    --groove-bg: rgba(34,197,94,0.10);
    --groove-border: rgba(34,197,94,0.30);
    --harmony: #818cf8;
    --harmony-bg: rgba(129,140,248,0.10);
    --harmony-border: rgba(129,140,248,0.30);
    --both: #38bdf8;
    --both-bg: rgba(56,189,248,0.10);
    --both-border: rgba(56,189,248,0.30);
    --enterprise: #fb923c;
    --enterprise-bg: rgba(251,146,60,0.10);
    --enterprise-border: rgba(251,146,60,0.30);
    --bonus: #f472b6;
    --bonus-bg: rgba(244,114,182,0.10);
    --bonus-border: rgba(244,114,182,0.30);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .archive-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .archive-link:hover {
    color: var(--text);
    border-color: var(--both-border);
    background: var(--both-bg);
  }
  .archive-banner {
    max-width: 1100px;
    margin: -8px auto 20px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--bonus);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
  }
  #report-date {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Section labels ─────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Spotlights grid ────────────────────── */
  .spotlights {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #3e4265; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* pill variants */
  .pill-groove    { background: var(--groove-bg);     color: var(--groove);     border: 1px solid var(--groove-border); }
  .pill-harmony   { background: var(--harmony-bg);    color: var(--harmony);    border: 1px solid var(--harmony-border); }
  .pill-both      { background: var(--both-bg);       color: var(--both);       border: 1px solid var(--both-border); }
  .pill-enterprise{ background: var(--enterprise-bg); color: var(--enterprise); border: 1px solid var(--enterprise-border); }
  .pill-bonus     { background: var(--bonus-bg);      color: var(--bonus);      border: 1px solid var(--bonus-border); }

  /* spotlight card accent stripe */
  .card.spotlight-flux      { border-top: 3px solid var(--groove); }
  .card.spotlight-harmony   { border-top: 3px solid var(--harmony); }
  .card.spotlight-both      { border-top: 3px solid var(--both); }
  .card.spotlight-enterprise{ border-top: 3px solid var(--enterprise); }
  .card.spotlight-bonus     { border-top: 3px solid var(--bonus); }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: #b0b4cc;
    line-height: 1.65;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    gap: 8px;
  }

  .relevance {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .source-link:hover { color: var(--text); }
  .source-link svg { flex-shrink: 0; }

  /* ── More stories ───────────────────────── */
  .more-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  .story-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .story-item {
    background: var(--surface);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 12px;
    transition: background 0.12s;
  }

  .story-item:hover { background: var(--surface2); }

  .story-pill { margin-top: 2px; }

  .story-body { min-width: 0; }

  .story-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .story-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .story-source {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
    margin-top: 3px;
    transition: color 0.15s;
  }

  .story-source:hover { color: var(--text); }

  /* ── Empty / error states ───────────────── */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* render-fix v1 bullets css */
  .card .bullets {
    list-style: disc;
    padding-left: 18px;
    margin: 0;
    color: #b0b4cc;
    font-size: 13px;
    line-height: 1.65;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card .bullets li {
    margin-left: 0;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Daily AI Intel</h1>
    <span>Prevwind · Project Flux · Archived</span>
  </div>
  <div class="header-right">
    <a class="archive-link" href="archive/" title="Browse prior days">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      Archive
    </a>
    <div id="report-date">2026-05-05</div>
  </div>
</header>

<div class="archive-banner">
  Viewing archived report. <a href="../" style="color:var(--both)">Go to today's dashboard</a> or <a href="index.html" style="color:var(--both)">browse all archives</a>.
</div>

<!-- ── Spotlight section ──────────────────────── -->
<div class="section-label" style="max-width:1100px;margin:0 auto 12px;">Spotlights</div>
<div class="spotlights" id="spotlight-grid"></div>

<!-- ── More stories ──────────────────────────── -->
<div class="more-section">
  <div class="section-label">More Stories</div>
  <div class="story-list" id="story-list"></div>
</div>

<footer>
  <span>Auto-generated · Prevwind internal</span>
  <span id="footer-count"></span>
</footer>

<!-- ═══════════════════════════════════════════════
     DATA — edit this object to update the report
     ════════════════════════════════════════════ -->
<script>
const REPORT = {
  date: "2026-05-06",
  spotlights: [
    {
      title: "Microsoft Agent 365 ships Entra ID Governance for agents (access packages + sponsor lifecycle)",
      tag: "enterprise",
      bullets: [
        "Brings agent identities into the same governance model as people, so permissions stay intentional as agents evolve.",
        "Uses access packages to scope what an agent can reach, plus sponsor-driven lifecycle workflows to keep a human accountable.",
        "Pilot next: define a standard access package per agent class (support, finance, IT ops) and attach it at agent creation time."
      ],
      sourceLabel: "Microsoft Tech Community",
      sourceUrl: "https://techcommunity.microsoft.com/blog/agent-365-blog/what%E2%80%99s-new-in-agent-365-may-2026/4516340"
    },
    {
      title: "Proptech shifts from document checks to direct-source verification as AI-generated rental fraud rises",
      tag: "groove",
      bullets: [
        "Rental and mortgage operators report AI is making fake IDs, pay stubs, and bank statements cheaper to produce and harder to detect.",
        "The response trend: move from uploaded-document review toward direct-source payroll/banking data and automated integrity checks.",
        "Pilot next: add a second-path verification flow for any application with mismatched identity/income signals (velocity without blind trust)."
      ],
      sourceLabel: "Commercial Observer",
      sourceUrl: "https://commercialobserver.com/2026/05/proptech-mortgage-fraud-rental-fraud/"
    },
    {
      title: "Open-source runtime security: Microsoft’s Agent Governance Toolkit targets OWASP agentic AI risks",
      tag: "bonus",
      bonus: true,
      bullets: [
        "MIT-licensed toolkit pitches sub-millisecond policy enforcement and coverage for the OWASP Agentic AI Top 10.",
        "Includes policy-as-code (YAML/OPA Rego/Cedar), plugin signing, and adapters for popular agent frameworks.",
        "Use it as a reference architecture for policy interception, tool-call gating, and supply-chain controls in agent runtimes."
      ],
      sourceLabel: "Microsoft Open Source Blog",
      sourceUrl: "https://opensource.microsoft.com/blog/2026/04/02/introducing-the-agent-governance-toolkit-open-source-runtime-security-for-ai-agents/"
    },
    {
      title: "Adobe Firefly upgrades video editing with in-editor Enhance Speech and adds Kling 3.0 models",
      tag: "bonus",
      bonus: true,
      bullets: [
        "Firefly Video Editor adds audio cleanup (Enhance Speech, noise/reverb control) directly in the browser workflow.",
        "Adobe highlights adding Kling 3.0 and Kling 3.0 Omni models alongside other third-party models.",
        "Good fit for teams producing weekly promos: fast rough-cuts + dialogue cleanup without round-tripping audio tools."
      ],
      sourceLabel: "Adobe Blog",
      sourceUrl: "https://blog.adobe.com/en/publish/2026/04/15/adobe-extends-leadership-video-unleashing-new-ai-powered-creation-firefly-reinventing-color-editors-in-premiere"
    }
  ],
  stories: [
    {
      title: "Microsoft Entra announces RSAC 2026 push for Agent ID as the identity foundation for Agent 365",
      tag: "enterprise",
      sourceLabel: "Microsoft Tech Community",
      sourceUrl: "https://techcommunity.microsoft.com/blog/microsoft-entra-blog/microsoft-entra-innovations-announced-at-rsac-2026/4502146"
    },
    {
      title: "Okta outlines “secure agentic enterprise” blueprint and Okta for AI Agents (discover, govern, revoke)",
      tag: "enterprise",
      sourceLabel: "Okta Newsroom",
      sourceUrl: "https://www.okta.com/newsroom/press-releases/showcase-2026/"
    },
    {
      title: "PNNL explores how connected lighting systems can process OpenADR 2.0b signals via certified tools + Python",
      tag: "both",
      sourceLabel: "U.S. Department of Energy",
      sourceUrl: "https://www.energy.gov/cmei/ssl/exploring-reaction-cls-openadr-20b-signals"
    },
    {
      title: "Captions adds inline translate/transcribe/dub plus SRT export and per-shot eye contact tools",
      tag: "bonus",
      sourceLabel: "Captions Help Center",
      sourceUrl: "https://captions.ai/help/whats-new"
    },
    {
      title: "Bisnow reports AI is making rental application fraud harder to spot for apartment owners",
      tag: "groove",
      sourceLabel: "Bisnow",
      sourceUrl: "https://www.bisnow.com/national/news/multifamily/ai-rent-fraud-apartment-renters-landlords-pay-price-134391"
    },
    {
      title: "DOE highlights grid-edge interoperability work sending OpenADR signals to endpoints using certified commercial software",
      tag: "harmony",
      sourceLabel: "U.S. Department of Energy",
      sourceUrl: "https://www.energy.gov/cmei/ssl/cls-potential-grid-services"
    }
  ]
};


/* render-fix v1 — TAG_META + bullets */
const TAG_META = {
  groove:     { label: 'GrooveGrid',              pillClass: 'pill-groove',     cardClass: 'spotlight-flux'      },
  harmony:    { label: 'HarmonyGrid',             pillClass: 'pill-harmony',    cardClass: 'spotlight-harmony'   },
  both:       { label: 'GrooveGrid + HarmonyGrid',pillClass: 'pill-both',       cardClass: 'spotlight-both'      },
  enterprise: { label: 'Enterprise',              pillClass: 'pill-enterprise', cardClass: 'spotlight-enterprise'},
  bonus:      { label: 'Bonus',                   pillClass: 'pill-bonus',      cardClass: 'spotlight-bonus'     }
};

function escapeHTML(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function pill(tag) {
  const m = TAG_META[tag] || TAG_META.enterprise;
  return `<span class="pill ${m.pillClass}">${escapeHTML(m.label)}</span>`;
}

function externalIcon() {
  return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`;
}

/* ── Date ──────────────────────────────────────────────────────────────── */
(function () {
  try {
    const d = new Date(REPORT.date + 'T12:00:00');
    const fmt = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const el = document.getElementById('report-date');
    if (el) el.textContent = fmt;
  } catch (e) { /* non-fatal */ }
})();

/* ── Spotlights ────────────────────────────────────────────────────────── */
const spotlightsAll = (REPORT && Array.isArray(REPORT.spotlights)) ? REPORT.spotlights : [];
const visibleSpotlights = spotlightsAll.filter((s, i) => {
  if (s && s.bonus) return true;
  return i < 4;  // safety cap; matches README 'hard cap 4'
});

function spotlightCard(s) {
  const m = TAG_META[s.tag] || TAG_META.enterprise;
  const heading = escapeHTML(s.title || s.headline || '(untitled)');
  const bulletsArr = Array.isArray(s.bullets) ? s.bullets : (s.summary ? [s.summary] : []);
  const bulletsHTML = bulletsArr.length
    ? `<ul class="bullets">${bulletsArr.map(b => `<li>${escapeHTML(b)}</li>`).join('')}</ul>`
    : '';
  const sourceLabel = escapeHTML(s.sourceLabel || 'Source');
  const sourceUrl   = String(s.sourceUrl || '#');
  return `
    <div class="card ${m.cardClass}">
      <div class="card-header">
        <h2>${heading}</h2>
        ${pill(s.tag)}
      </div>
      ${bulletsHTML}
      <div class="card-footer">
        <span class="relevance">${escapeHTML(s.relevance || '')}</span>
        <a class="source-link" href="${sourceUrl}" target="_blank" rel="noopener">
          ${externalIcon()} ${sourceLabel}
        </a>
      </div>
    </div>`;
}

(function () {
  const grid = document.getElementById('spotlight-grid');
  if (!grid) return;
  if (visibleSpotlights.length === 0) {
    grid.innerHTML = `<div class="empty">No spotlights for today.</div>`;
  } else {
    grid.innerHTML = visibleSpotlights.map(spotlightCard).join('');
  }
})();

/* ── Stories ───────────────────────────────────────────────────────────── */
function storyRow(s) {
  const title = escapeHTML(s.title || s.headline || '(untitled)');
  const summary = escapeHTML(s.summary || '');
  const sourceLabel = escapeHTML(s.sourceLabel || 'Source');
  const sourceUrl   = String(s.sourceUrl || '#');
  const summaryHTML = summary ? `<div class="story-summary">${summary}</div>` : '';
  return `
    <div class="story-item">
      <div class="story-pill">${pill(s.tag)}</div>
      <div class="story-body">
        <div class="story-title">${title}</div>
        ${summaryHTML}
      </div>
      <a class="story-source" href="${sourceUrl}" target="_blank" rel="noopener">
        ${externalIcon()} ${sourceLabel}
      </a>
    </div>`;
}

(function () {
  const list = document.getElementById('story-list');
  if (!list) return;
  const stories = (REPORT && Array.isArray(REPORT.stories)) ? REPORT.stories : [];
  if (stories.length === 0) {
    list.innerHTML = `<div class="empty">No additional stories today.</div>`;
  } else {
    list.innerHTML = stories.map(storyRow).join('');
  }
})();

/* ── Footer count ──────────────────────────────────────────────────────── */
(function () {
  const el = document.getElementById('footer-count');
  if (!el) return;
  const s = visibleSpotlights.length;
  const t = (REPORT && Array.isArray(REPORT.stories)) ? REPORT.stories.length : 0;
  el.textContent = `${s} spotlight${s !== 1 ? 's' : ''} · ${t} stories`;
})();
</script>
</body>
</html>
