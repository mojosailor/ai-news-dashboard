<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Intel — Prevwind</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3149;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --groove: #22c55e;
    --groove-bg: rgba(34,197,94,0.10);
    --groove-border: rgba(34,197,94,0.30);
    --harmony: #818cf8;
    --harmony-bg: rgba(129,140,248,0.10);
    --harmony-border: rgba(129,140,248,0.30);
    --both: #38bdf8;
    --both-bg: rgba(56,189,248,0.10);
    --both-border: rgba(56,189,248,0.30);
    --enterprise: #fb923c;
    --enterprise-bg: rgba(251,146,60,0.10);
    --enterprise-border: rgba(251,146,60,0.30);
    --bonus: #f472b6;
    --bonus-bg: rgba(244,114,182,0.10);
    --bonus-border: rgba(244,114,182,0.30);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .archive-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .archive-link:hover {
    color: var(--text);
    border-color: var(--both-border);
    background: var(--both-bg);
  }
  .archive-banner {
    max-width: 1100px;
    margin: -8px auto 20px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--bonus);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
  }
  #report-date {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Section labels ─────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Spotlights grid ────────────────────── */
  .spotlights {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #3e4265; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* pill variants */
  .pill-groove    { background: var(--groove-bg);     color: var(--groove);     border: 1px solid var(--groove-border); }
  .pill-harmony   { background: var(--harmony-bg);    color: var(--harmony);    border: 1px solid var(--harmony-border); }
  .pill-both      { background: var(--both-bg);       color: var(--both);       border: 1px solid var(--both-border); }
  .pill-enterprise{ background: var(--enterprise-bg); color: var(--enterprise); border: 1px solid var(--enterprise-border); }
  .pill-bonus     { background: var(--bonus-bg);      color: var(--bonus);      border: 1px solid var(--bonus-border); }

  /* spotlight card accent stripe */
  .card.spotlight-flux      { border-top: 3px solid var(--groove); }
  .card.spotlight-harmony   { border-top: 3px solid var(--harmony); }
  .card.spotlight-both      { border-top: 3px solid var(--both); }
  .card.spotlight-enterprise{ border-top: 3px solid var(--enterprise); }
  .card.spotlight-bonus     { border-top: 3px solid var(--bonus); }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: #b0b4cc;
    line-height: 1.65;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    gap: 8px;
  }

  .relevance {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .source-link:hover { color: var(--text); }
  .source-link svg { flex-shrink: 0; }

  /* ── More stories ───────────────────────── */
  .more-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  .story-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .story-item {
    background: var(--surface);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 12px;
    transition: background 0.12s;
  }

  .story-item:hover { background: var(--surface2); }

  .story-pill { margin-top: 2px; }

  .story-body { min-width: 0; }

  .story-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .story-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .story-source {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
    margin-top: 3px;
    transition: color 0.15s;
  }

  .story-source:hover { color: var(--text); }

  /* ── Empty / error states ───────────────── */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* render-fix v1 bullets css */
  .card .bullets {
    list-style: disc;
    padding-left: 18px;
    margin: 0;
    color: #b0b4cc;
    font-size: 13px;
    line-height: 1.65;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card .bullets li {
    margin-left: 0;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Daily AI Intel</h1>
    <span>Prevwind · Project Flux · Archived</span>
  </div>
  <div class="header-right">
    <a class="archive-link" href="archive/" title="Browse prior days">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      Archive
    </a>
    <div id="report-date">2026-04-29</div>
  </div>
</header>

<div class="archive-banner">
  Viewing archived report. <a href="../" style="color:var(--both)">Go to today's dashboard</a> or <a href="index.html" style="color:var(--both)">browse all archives</a>.
</div>

<!-- ── Spotlight section ──────────────────────── -->
<div class="section-label" style="max-width:1100px;margin:0 auto 12px;">Spotlights</div>
<div class="spotlights" id="spotlight-grid"></div>

<!-- ── More stories ──────────────────────────── -->
<div class="more-section">
  <div class="section-label">More Stories</div>
  <div class="story-list" id="story-list"></div>
</div>

<footer>
  <span>Auto-generated · Prevwind internal</span>
  <span id="footer-count"></span>
</footer>

<!-- ═══════════════════════════════════════════════
     DATA — edit this object to update the report
     ════════════════════════════════════════════ -->
<script>
const REPORT = {
  "date": "2026-04-29",
  "spotlights": [
    {
      "title": "Ping Identity makes 'Identity for AI' generally available for runtime agent IAM",
      "tag": "enterprise",
      "bullets": [
        "Agent IAM Core + Agent Gateway + Agent Detection aim to treat agents as first-class identities with delegated, scoped authorization.",
        "Positioned for securing MCP-style integrations with runtime policy enforcement and monitoring.",
        "Pilot: inventory your top 10 agent tool calls and enforce least-privilege scopes + audit logging at the gateway layer."
      ],
      "sourceLabel": "Ping Identity press release",
      "sourceUrl": "https://press.pingidentity.com/2026-03-24-Ping-Identity-Defines-the-Runtime-Identity-Standard-for-Autonomous-AI"
    },
    {
      "title": "Identity Digital launches DNSid, a DNS-anchored identity standard for AI agents",
      "tag": "enterprise",
      "bullets": [
        "Proposes a persistent identifier that binds each agent to verifiable ownership and lifecycle events (ownership, transfer, revocation).",
        "Uses DNS infrastructure plus PKI + blockchain concepts for cross-org interoperability.",
        "Pilot: decide whether your org needs a durable agent identifier separate from runtime auth tokens."
      ],
      "sourceLabel": "GlobeNewswire via FinancialContent",
      "sourceUrl": "https://www.financialcontent.com/article/gnwcq-2026-4-27-identity-digital-launches-neutral-dns-anchored-identity-standard-for-ai-agents"
    },
    {
      "title": "OpenADR webinar spotlights AI + OpenADR 3 for autonomous local demand flexibility",
      "tag": "harmony",
      "bullets": [
        "OpenADR Alliance highlights a path where standards handle signaling/communication while AI optimizes device-level control.",
        "Reinforces a 'grid-signal in, outcome out' pattern for building + home flexibility without waiting for new device standards.",
        "Pilot: map your VTN/VEN plan and where an AI layer could sit (forecasting, constraint solving, verification)."
      ],
      "sourceLabel": "OpenADR Alliance webinar series",
      "sourceUrl": "https://www.openadr.org/webinar-series"
    },
    {
      "title": "Adobe unveils Firefly AI Assistant, a creative agent spanning Creative Cloud workflows",
      "tag": "bonus",
      "bonus": true,
      "bullets": [
        "Firefly AI Assistant is positioned as a conversational interface that orchestrates multi-step workflows across Creative Cloud apps.",
        "Firefly expands video/image editing controls and emphasizes model choice (multiple third-party models in roster).",
        "Pilot: test a single 'brief → assets' workflow for sermon series graphics or event promos, then codify prompts + review steps."
      ],
      "sourceLabel": "Adobe Newsroom",
      "sourceUrl": "https://news.adobe.com/news/2026/04/adobe-new-creative-agent"
    }
  ],
  "stories": [
    {
      "title": "Meta, Google, and Microsoft are leaning on new natural gas plants to power AI data centers",
      "tag": "both",
      "summary": "A TechCrunch analysis frames the near-term AI power crunch as pushing major AI companies toward large new gas generation projects, raising reliability and climate tradeoffs.",
      "sourceLabel": "TechCrunch",
      "sourceUrl": "https://techcrunch.com/2026/04/03/ai-companies-are-building-huge-natural-gas-plants-to-power-data-centers-what-could-go-wrong/"
    },
    {
      "title": "LM Studio 0.4.12 adds Qwen 3.6 support and fixes MCP OAuth issues on some Windows setups",
      "tag": "harmony",
      "summary": "LM Studio's latest changelog highlights Qwen 3.6 support plus an MCP OAuth fix, keeping the local-model desktop stack moving fast.",
      "sourceLabel": "LM Studio changelog",
      "sourceUrl": "https://lmstudio.ai/changelog/lmstudio-v0.4.12"
    },
    {
      "title": "Ollama update leverages Apple's MLX framework for major speedups on Apple silicon Macs",
      "tag": "harmony",
      "summary": "MacRumors reports Ollama shipped an update using Apple's MLX to speed up prefill and decode on Apple silicon, making local assistants feel snappier.",
      "sourceLabel": "MacRumors",
      "sourceUrl": "https://www.macrumors.com/2026/03/31/ollama-now-runs-faster-apple-silicon-macs/"
    },
    {
      "title": "Rechat adds AI Memo for real-time conversation capture and structured follow-up in real estate workflows",
      "tag": "groove",
      "summary": "RISMedia reports Rechat launched AI Memo to capture, transcribe, and structure client conversations, aiming to improve follow-up and reduce dropped balls.",
      "sourceLabel": "RISMedia",
      "sourceUrl": "https://www.rismedia.com/2026/04/08/rechat-launches-ai-memo-to-capture-agent-conversations-in-real-time/"
    },
    {
      "title": "Buildium highlights embedded 'Lumina AI' workflows for billing, comms, leasing, and maintenance",
      "tag": "groove",
      "summary": "Buildium's 2026 overview outlines AI-assisted invoice extraction and message drafting as part of property management workflows, with higher-end 'AI Workforce' agents.",
      "sourceLabel": "Buildium",
      "sourceUrl": "https://www.buildium.com/blog/best-ai-property-management-tools/"
    },
    {
      "title": "Google expands Lyria 3 Pro music generation across Gemini, Vertex AI, AI Studio, and Vids",
      "tag": "bonus",
      "bonus": true,
      "summary": "Google says Lyria 3 Pro can generate longer, structured tracks (up to 3 minutes) and is rolling into multiple products and APIs with SynthID watermarking.",
      "sourceLabel": "Google blog",
      "sourceUrl": "https://blog.google/innovation-and-ai/technology/ai/lyria-3-pro/"
    }
  ]
}
;


/* render-fix v1 — TAG_META + bullets */
const TAG_META = {
  groove:     { label: 'GrooveGrid',              pillClass: 'pill-groove',     cardClass: 'spotlight-flux'      },
  harmony:    { label: 'HarmonyGrid',             pillClass: 'pill-harmony',    cardClass: 'spotlight-harmony'   },
  both:       { label: 'GrooveGrid + HarmonyGrid',pillClass: 'pill-both',       cardClass: 'spotlight-both'      },
  enterprise: { label: 'Enterprise',              pillClass: 'pill-enterprise', cardClass: 'spotlight-enterprise'},
  bonus:      { label: 'Bonus',                   pillClass: 'pill-bonus',      cardClass: 'spotlight-bonus'     }
};

function escapeHTML(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function pill(tag) {
  const m = TAG_META[tag] || TAG_META.enterprise;
  return `<span class="pill ${m.pillClass}">${escapeHTML(m.label)}</span>`;
}

function externalIcon() {
  return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`;
}

/* ── Date ──────────────────────────────────────────────────────────────── */
(function () {
  try {
    const d = new Date(REPORT.date + 'T12:00:00');
    const fmt = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const el = document.getElementById('report-date');
    if (el) el.textContent = fmt;
  } catch (e) { /* non-fatal */ }
})();

/* ── Spotlights ────────────────────────────────────────────────────────── */
const spotlightsAll = (REPORT && Array.isArray(REPORT.spotlights)) ? REPORT.spotlights : [];
const visibleSpotlights = spotlightsAll.filter((s, i) => {
  if (s && s.bonus) return true;
  return i < 4;  // safety cap; matches README 'hard cap 4'
});

function spotlightCard(s) {
  const m = TAG_META[s.tag] || TAG_META.enterprise;
  const heading = escapeHTML(s.title || s.headline || '(untitled)');
  const bulletsArr = Array.isArray(s.bullets) ? s.bullets : (s.summary ? [s.summary] : []);
  const bulletsHTML = bulletsArr.length
    ? `<ul class="bullets">${bulletsArr.map(b => `<li>${escapeHTML(b)}</li>`).join('')}</ul>`
    : '';
  const sourceLabel = escapeHTML(s.sourceLabel || 'Source');
  const sourceUrl   = String(s.sourceUrl || '#');
  return `
    <div class="card ${m.cardClass}">
      <div class="card-header">
        <h2>${heading}</h2>
        ${pill(s.tag)}
      </div>
      ${bulletsHTML}
      <div class="card-footer">
        <span class="relevance">${escapeHTML(s.relevance || '')}</span>
        <a class="source-link" href="${sourceUrl}" target="_blank" rel="noopener">
          ${externalIcon()} ${sourceLabel}
        </a>
      </div>
    </div>`;
}

(function () {
  const grid = document.getElementById('spotlight-grid');
  if (!grid) return;
  if (visibleSpotlights.length === 0) {
    grid.innerHTML = `<div class="empty">No spotlights for today.</div>`;
  } else {
    grid.innerHTML = visibleSpotlights.map(spotlightCard).join('');
  }
})();

/* ── Stories ───────────────────────────────────────────────────────────── */
function storyRow(s) {
  const title = escapeHTML(s.title || s.headline || '(untitled)');
  const summary = escapeHTML(s.summary || '');
  const sourceLabel = escapeHTML(s.sourceLabel || 'Source');
  const sourceUrl   = String(s.sourceUrl || '#');
  const summaryHTML = summary ? `<div class="story-summary">${summary}</div>` : '';
  return `
    <div class="story-item">
      <div class="story-pill">${pill(s.tag)}</div>
      <div class="story-body">
        <div class="story-title">${title}</div>
        ${summaryHTML}
      </div>
      <a class="story-source" href="${sourceUrl}" target="_blank" rel="noopener">
        ${externalIcon()} ${sourceLabel}
      </a>
    </div>`;
}

(function () {
  const list = document.getElementById('story-list');
  if (!list) return;
  const stories = (REPORT && Array.isArray(REPORT.stories)) ? REPORT.stories : [];
  if (stories.length === 0) {
    list.innerHTML = `<div class="empty">No additional stories today.</div>`;
  } else {
    list.innerHTML = stories.map(storyRow).join('');
  }
})();

/* ── Footer count ──────────────────────────────────────────────────────── */
(function () {
  const el = document.getElementById('footer-count');
  if (!el) return;
  const s = visibleSpotlights.length;
  const t = (REPORT && Array.isArray(REPORT.stories)) ? REPORT.stories.length : 0;
  el.textContent = `${s} spotlight${s !== 1 ? 's' : ''} · ${t} stories`;
})();
</script>
</body>
</html>
