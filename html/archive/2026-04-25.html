<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Intel — Prevwind</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3149;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --groove: #22c55e;
    --groove-bg: rgba(34,197,94,0.10);
    --groove-border: rgba(34,197,94,0.30);
    --harmony: #818cf8;
    --harmony-bg: rgba(129,140,248,0.10);
    --harmony-border: rgba(129,140,248,0.30);
    --both: #38bdf8;
    --both-bg: rgba(56,189,248,0.10);
    --both-border: rgba(56,189,248,0.30);
    --enterprise: #fb923c;
    --enterprise-bg: rgba(251,146,60,0.10);
    --enterprise-border: rgba(251,146,60,0.30);
    --bonus: #f472b6;
    --bonus-bg: rgba(244,114,182,0.10);
    --bonus-border: rgba(244,114,182,0.30);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .archive-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .archive-link:hover {
    color: var(--text);
    border-color: var(--both-border);
    background: var(--both-bg);
  }
  #report-date {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Section labels ─────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Spotlights grid ────────────────────── */
  .spotlights {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #3e4265; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* pill variants */
  .pill-groove    { background: var(--groove-bg);     color: var(--groove);     border: 1px solid var(--groove-border); }
  .pill-harmony   { background: var(--harmony-bg);    color: var(--harmony);    border: 1px solid var(--harmony-border); }
  .pill-both      { background: var(--both-bg);       color: var(--both);       border: 1px solid var(--both-border); }
  .pill-enterprise{ background: var(--enterprise-bg); color: var(--enterprise); border: 1px solid var(--enterprise-border); }
  .pill-bonus     { background: var(--bonus-bg);      color: var(--bonus);      border: 1px solid var(--bonus-border); }

  /* spotlight card accent stripe */
  .card.spotlight-flux      { border-top: 3px solid var(--groove); }
  .card.spotlight-harmony   { border-top: 3px solid var(--harmony); }
  .card.spotlight-both      { border-top: 3px solid var(--both); }
  .card.spotlight-enterprise{ border-top: 3px solid var(--enterprise); }
  .card.spotlight-bonus     { border-top: 3px solid var(--bonus); }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: #b0b4cc;
    line-height: 1.65;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    gap: 8px;
  }

  .relevance {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .source-link:hover { color: var(--text); }
  .source-link svg { flex-shrink: 0; }

  /* ── More stories ───────────────────────── */
  .more-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  .story-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .story-item {
    background: var(--surface);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 12px;
    transition: background 0.12s;
  }

  .story-item:hover { background: var(--surface2); }

  .story-pill { margin-top: 2px; }

  .story-body { min-width: 0; }

  .story-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .story-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .story-source {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
    margin-top: 3px;
    transition: color 0.15s;
  }

  .story-source:hover { color: var(--text); }

  /* ── Empty / error states ───────────────── */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Daily AI Intel</h1>
    <span>Prevwind · Project Flux</span>
  </div>
  <div class="header-right">
    <a class="archive-link" href="archive/" title="Browse prior days">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      Archive
    </a>
    <div id="report-date"></div>
  </div>
</header>
    <div class="archive-banner">
      <div class="archive-banner-inner">
        <strong>This is an archived edition.</strong>
        <span>Go to <a href="../">Latest</a> or browse the <a href="index.html">Archive</a>.</span>
      </div>
    </div>


<!-- ── Spotlight section ──────────────────────── -->
<div class="section-label" style="max-width:1100px;margin:0 auto 12px;">Spotlights</div>
<div class="spotlights" id="spotlight-grid"></div>

<!-- ── More stories ──────────────────────────── -->
<div class="more-section">
  <div class="section-label">More Stories</div>
  <div class="story-list" id="story-list"></div>
</div>

<footer>
  <span>Auto-generated · Prevwind internal</span>
  <span id="footer-count"></span>
</footer>

<!-- ═══════════════════════════════════════════════
     DATA — edit this object to update the report
     ════════════════════════════════════════════ -->
<script>
/*
  TAG values:
    "groove"      → [GrooveGrid]
    "harmony"     → [HarmonyGrid]
    "both"        → [GrooveGrid + HarmonyGrid]
    "enterprise"  → General Enterprise
    "bonus"       → Bonus (rare 3rd spotlight, big-news days only)

  Set bonus:true on a spotlight to show it as the optional 3rd card.
  If bonus:true but you only want 2, simply remove the entry.
*/
const REPORT = {
  date: "2026-04-25",

  spotlights: [
    {
      title: "[HarmonyGrid] Enphase pairs IQ Batteries with Evergen software to join virtual power plants",
      bullets: [
        "Enphase integrates IQ Batteries with Evergen\u2019s VPP platform in Australia and New Zealand.",
        "Households can coordinate charging/discharging to respond to grid needs and energy price signals.",
        "Pilot next: map required telemetry + dispatch latencies for OpenADR event participation and retailer programs.",
      ],
      tags: ["harmony"],
      sourceLabel: "Yahoo Finance (Simply Wall St)",
      sourceUrl: "https://finance.yahoo.com/sectors/energy/articles/enphase-evergen-partnership-puts-iq-180453777.html",
    },
    {
      title: "[Enterprise] Microsoft Agent Framework hits 1.0 with production-ready orchestration + MCP connectors",
      bullets: [
        "Microsoft released Agent Framework 1.0 for both .NET and Python with stable APIs and long-term support.",
        "Includes connectors across major model providers plus memory/context providers and graph-based workflows.",
        "Pilot next: standardize agent tool access via MCP, then add audit logging around connector calls and handoffs.",
      ],
      tags: ["enterprise"],
      sourceLabel: "Microsoft DevBlogs",
      sourceUrl: "https://devblogs.microsoft.com/agent-framework/microsoft-agent-framework-version-1-0/",
    },
    {
      title: "[BONUS] Okta previews \u2018Okta for AI Agents\u2019 to discover, register, and revoke agent access",
      bullets: [
        "Okta says \u2018Okta for AI Agents\u2019 will be available April 30, 2026.",
        "Positioned to help teams discover/register agents, standardize access, and quickly revoke access for rogue behavior.",
        "Pilot next: treat agents as first-class identities (registration + least-privilege), and require human approval for high-risk tools.",
      ],
      tags: ["enterprise", "bonus"],
      bonus: true,
      sourceLabel: "Okta",
      sourceUrl: "https://www.okta.com/newsroom/press-releases/showcase-2026/",
    },
    {
      title: "[BONUS] ElevenLabs launches ElevenMusic iOS app for text-to-song generation and remixing",
      bullets: [
        "ElevenLabs released an iOS app called ElevenMusic for creating and remixing songs from natural-language prompts.",
        "Free tier allows up to seven songs per day; Pro is $9.99/month (or $95.90/year) with up to 500 tracks/month.",
        "Pilot next: use it for short-form lyric hooks + stems, then export into your DAW for Sunday-service arrangements.",
      ],
      tags: ["bonus"],
      bonus: true,
      sourceLabel: "TechCrunch",
      sourceUrl: "https://techcrunch.com/2026/04/02/elevenlabs-releases-a-new-ai-powered-music-generation-app/",
    },
  ],

  stories: [
    {
      title: "MetaComp publishes a \u2018Know Your Agent\u2019 framework for governing AI agents in regulated finance",
      summary: "A PR Newswire announcement says MetaComp\u2019s StableX KYA framework covers agent identity/registration, authorization, monitoring, audit trails, and agent-to-agent governance for regulated financial workflows.",
      tags: ["enterprise"],
      sourceLabel: "PR Newswire",
      sourceUrl: "https://www.prnewswire.com/news-releases/metacomp-launches-the-worlds-first-ai-agent-governance-framework-for-regulated-financial-services-302748416.html",
    },
    {
      title: "LM Studio 0.4.11 adds support for the updated Gemma 4 chat template",
      summary: "LM Studio\u2019s changelog notes 0.4.11 (April 10) adds support for the updated Gemma 4 chat template, smoothing local testing with the new prompt format.",
      tags: ["harmony"],
      sourceLabel: "LM Studio",
      sourceUrl: "https://lmstudio.ai/changelog/lmstudio-v0.4.11",
    },
    {
      title: "Ollama 0.19 preview uses Apple\u2019s MLX for faster local inference on Apple Silicon",
      summary: "Ollama\u2019s 0.19 preview leverages Apple\u2019s MLX framework; Ollama claims ~1.6\u00d7 faster prompt processing and nearly 2\u00d7 decode speed, with current support limited to Qwen3.5 and requiring >32GB unified memory.",
      tags: ["harmony"],
      sourceLabel: "MacRumors",
      sourceUrl: "https://www.macrumors.com/2026/03/31/ollama-now-runs-faster-apple-silicon-macs/",
    },
    {
      title: "PropStream adds a \u2018PropStream Intelligence Assistant\u2019 plus new Rental ROI and Fix & Flip calculators",
      summary: "PropStream introduced a property-aware assistant inside the Property Details page with streaming, multilingual responses, plus built-in calculators for rental ROI and fix-and-flip analysis.",
      tags: ["groove"],
      sourceLabel: "PropStream",
      sourceUrl: "https://www.propstream.com/news/introducing-the-new-propstream-intelligence-assistant-real-estate-research-reimagined-by-ai",
    },
    {
      title: "Rechat launches \u2018AI Memo\u2019 to capture and structure client conversations across the real estate workflow",
      summary: "RISMedia reports Rechat\u2019s AI Memo captures/transcribes interactions and turns them into structured notes connected to contacts and transactions, available to all users at no additional cost.",
      tags: ["groove"],
      sourceLabel: "RISMedia",
      sourceUrl: "https://www.rismedia.com/2026/04/08/rechat-launches-ai-memo-to-capture-agent-conversations-in-real-time/",
    },
    {
      title: "OpenADR Alliance argues microgrids can help meet AI-driven data center demand for flexibility",
      summary: "An OpenADR Alliance blog post discusses microgrids as a flexibility lever as data center power demand grows, positioning demand response standards as an enabler.",
      tags: ["both"],
      sourceLabel: "Interface",
      sourceUrl: "https://interface.media/blog/2026/04/09/could-surging-data-centre-power-demand-be-an-opportunity-for-microgrids/",
    },
  ],
};
// ────────────────────────────────────────────────────────────────────────────

/* ── Render helpers ─────────────────────────────────────────────────────── */
const TAG_META = {
  groove:     { label: "GrooveGrid",              pillClass: "pill-groove",     cardClass: "spotlight-flux" },
  harmony:    { label: "HarmonyGrid",             pillClass: "pill-harmony",    cardClass: "spotlight-harmony" },
  both:       { label: "GrooveGrid + HarmonyGrid",pillClass: "pill-both",       cardClass: "spotlight-both" },
  enterprise: { label: "Enterprise",              pillClass: "pill-enterprise", cardClass: "spotlight-enterprise" },
  bonus:      { label: "Bonus",                   pillClass: "pill-bonus",      cardClass: "spotlight-bonus" },
};

function pill(tag) {
  const m = TAG_META[tag] || TAG_META.enterprise;
  return `<span class="pill ${m.pillClass}">${m.label}</span>`;
}

function externalIcon() {
  return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`;
}

/* ── Date ──────────────────────────────────────────────────────────────── */
const d = new Date(REPORT.date + "T12:00:00");
const fmt = d.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
document.getElementById("report-date").textContent = fmt;

/* ── Spotlights ────────────────────────────────────────────────────────── */
const grid = document.getElementById("spotlight-grid");
const visibleSpotlights = REPORT.spotlights.filter((s, i) => {
  if (s.bonus) return true;   // bonus cards always show if present
  return i < 2;               // cap at 2 non-bonus spotlights
});

if (visibleSpotlights.length === 0) {
  grid.innerHTML = `<div class="empty">No spotlights for today.</div>`;
} else {
  visibleSpotlights.forEach(s => {
    const m = TAG_META[s.tag] || TAG_META.enterprise;
    grid.innerHTML += `
      <div class="card ${m.cardClass}">
        <div class="card-header">
          <h2>${s.headline}</h2>
          ${pill(s.tag)}
        </div>
        <p>${s.summary}</p>
        <div class="card-footer">
          <span class="relevance">${s.relevance || ""}</span>
          <a class="source-link" href="${s.sourceUrl}" target="_blank" rel="noopener">
            ${externalIcon()} ${s.sourceLabel}
          </a>
        </div>
      </div>`;
  });
}

/* ── Stories ───────────────────────────────────────────────────────────── */
const list = document.getElementById("story-list");
if (!REPORT.stories || REPORT.stories.length === 0) {
  list.innerHTML = `<div class="empty">No additional stories today.</div>`;
} else {
  REPORT.stories.forEach(s => {
    list.innerHTML += `
      <div class="story-item">
        <div class="story-pill">${pill(s.tag)}</div>
        <div class="story-body">
          <div class="story-title">${s.title}</div>
          <div class="story-summary">${s.summary}</div>
        </div>
        <a class="story-source" href="${s.sourceUrl}" target="_blank" rel="noopener">
          ${externalIcon()} ${s.sourceLabel}
        </a>
      </div>`;
  });
}

/* ── Footer count ──────────────────────────────────────────────────────── */
const total = visibleSpotlights.length + (REPORT.stories?.length || 0);
document.getElementById("footer-count").textContent =
  `${visibleSpotlights.length} spotlight${visibleSpotlights.length !== 1 ? "s" : ""} · ${REPORT.stories?.length || 0} stories`;
</script>
</body>
</html>
