<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Intel — Prevwind</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3149;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --groove: #22c55e;
    --groove-bg: rgba(34,197,94,0.10);
    --groove-border: rgba(34,197,94,0.30);
    --harmony: #818cf8;
    --harmony-bg: rgba(129,140,248,0.10);
    --harmony-border: rgba(129,140,248,0.30);
    --both: #38bdf8;
    --both-bg: rgba(56,189,248,0.10);
    --both-border: rgba(56,189,248,0.30);
    --enterprise: #fb923c;
    --enterprise-bg: rgba(251,146,60,0.10);
    --enterprise-border: rgba(251,146,60,0.30);
    --bonus: #f472b6;
    --bonus-bg: rgba(244,114,182,0.10);
    --bonus-border: rgba(244,114,182,0.30);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .archive-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .archive-link:hover {
    color: var(--text);
    border-color: var(--both-border);
    background: var(--both-bg);
  }
  #report-date {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Section labels ─────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Spotlights grid ────────────────────── */
  .spotlights {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #3e4265; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* pill variants */
  .pill-groove    { background: var(--groove-bg);     color: var(--groove);     border: 1px solid var(--groove-border); }
  .pill-harmony   { background: var(--harmony-bg);    color: var(--harmony);    border: 1px solid var(--harmony-border); }
  .pill-both      { background: var(--both-bg);       color: var(--both);       border: 1px solid var(--both-border); }
  .pill-enterprise{ background: var(--enterprise-bg); color: var(--enterprise); border: 1px solid var(--enterprise-border); }
  .pill-bonus     { background: var(--bonus-bg);      color: var(--bonus);      border: 1px solid var(--bonus-border); }

  /* spotlight card accent stripe */
  .card.spotlight-flux      { border-top: 3px solid var(--groove); }
  .card.spotlight-harmony   { border-top: 3px solid var(--harmony); }
  .card.spotlight-both      { border-top: 3px solid var(--both); }
  .card.spotlight-enterprise{ border-top: 3px solid var(--enterprise); }
  .card.spotlight-bonus     { border-top: 3px solid var(--bonus); }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: #b0b4cc;
    line-height: 1.65;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    gap: 8px;
  }

  .relevance {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .source-link:hover { color: var(--text); }
  .source-link svg { flex-shrink: 0; }

  /* ── More stories ───────────────────────── */
  .more-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  .story-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .story-item {
    background: var(--surface);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 12px;
    transition: background 0.12s;
  }

  .story-item:hover { background: var(--surface2); }

  .story-pill { margin-top: 2px; }

  .story-body { min-width: 0; }

  .story-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .story-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .story-source {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
    margin-top: 3px;
    transition: color 0.15s;
  }

  .story-source:hover { color: var(--text); }

  /* ── Empty / error states ───────────────── */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* render-fix v1 bullets css */
  .card .bullets {
    list-style: disc;
    padding-left: 18px;
    margin: 0;
    color: #b0b4cc;
    font-size: 13px;
    line-height: 1.65;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card .bullets li {
    margin-left: 0;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Daily AI Intel</h1>
    <span>Prevwind · Project Flux</span>
  </div>
  <div class="header-right">
    <a class="archive-link" href="archive/" title="Browse prior days">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      Archive
    </a>
    <div id="report-date">2026-05-13</div>
  </div>
</header>
    <div class="archive-banner">
      <div class="archive-banner-inner">
        <div>You're viewing an archived edition (<strong>2026-05-13</strong>).</div>
        <div class="archive-banner-links">
          <a href="../">Go to Latest</a>
          <span>·</span>
          <a href="index.html">Browse Archive</a>
        </div>
      </div>
    </div>


<!-- ── Spotlight section ──────────────────────── -->
<div class="section-label" style="max-width:1100px;margin:0 auto 12px;">Spotlights</div>
<div class="spotlights" id="spotlight-grid"></div>

<!-- ── More stories ──────────────────────────── -->
<div class="more-section">
  <div class="section-label">More Stories</div>
  <div class="story-list" id="story-list"></div>
</div>

<footer>
  <span>Auto-generated · Prevwind internal</span>
  <span id="footer-count"></span>
</footer>

<!-- ═══════════════════════════════════════════════
     DATA — edit this object to update the report
     ════════════════════════════════════════════ -->
<script>
const REPORT = {
  date: '2026-05-13',
  spotlights: [
    {
      title: 'Matter + OpenADR liaison: standards groups align to connect smart-home devices to utility demand-response via an energy gateway',
      tag: 'both',
      bullets: [
        'Connectivity Standards Alliance and OpenADR Alliance announced a formal liaison agreement aimed at accelerating grid-connected residential energy management.',
        'Matter is positioned for in-home device ↔ energy-gateway communication, while OpenADR 3 is positioned for gateway ↔ utility/grid-operator signaling.',
        'Net: a cleaner, standards-based pathway for “device-level flexibility” programs (incentives for consumers; scalable DR mechanism for utilities).'
      ],
      sourceLabel: 'Connectivity Standards Alliance',
      sourceUrl: 'https://csa-iot.org/newsroom/connectivity-standards-alliance-and-openadr-alliance-announce-liaison-agreement-to-collaborate-on-grid-connected-energy-management/'
    },
    {
      title: 'Microsoft Agent 365 GA: a control plane for discovering, inventorying, and governing enterprise agent fleets (incl. shadow agents)',
      tag: 'enterprise',
      bullets: [
        'Microsoft announced general availability of Agent 365 focused on observability, governance, and security for agents operating with delegated or independent credentials.',
        'Agent registry + Defender/Intune integrations target discovery and inventory of local agents; policy controls can set guardrails on what agents are allowed to do.',
        'Starting June 2026, Defender adds asset-context mapping (devices, MCP servers, identities, reachable resources) to assess exposure and blast radius.'
      ],
      sourceLabel: 'Microsoft Security Blog',
      sourceUrl: 'https://www.microsoft.com/en-us/security/blog/2026/05/01/microsoft-agent-365-now-generally-available-expands-capabilities-and-integrations/'
    },
    {
      title: 'Zendure PowerHub: plug-in HEMS hub combining PV + storage + controllable loads, with ZENKI AI optimization and “VPP-ready” interfaces',
      tag: 'both',
      bonus: true,
      bullets: [
        'Zendure announced PowerHub as a central controller tying together PV, batteries, grid/backup, and controllable loads (heat pumps, EV chargers, smart home devices).',
        'The product emphasizes open interfaces and EU standards (SG-Ready, EEBus, OCPP) plus “VPP-ready” compatibility for grid services and revenue programs.',
        'Software stack: ZEN+OS with ZENKI AI for minute-by-minute decisions using habits, weather, and electricity prices; pre-orders now with shipments starting July 2026.'
      ],
      sourceLabel: 'Newswire (Zendure)',
      sourceUrl: 'https://www.newswire.ca/news-releases/zendure-launches-powerhub-europe-s-first-plug-in-hems-hub-that-turns-any-solar-home-into-a-whole-home-energy-ecosystem-882771835.html'
    },
    {
      title: 'Runway updates: Seedance 2.0 multi-input video generation/editing and “Runway Characters” real-time avatars via API',
      tag: 'bonus',
      bonus: true,
      bullets: [
        'Runway’s changelog highlights Seedance 2.0 (text/image/video/audio inputs) for video generation and editing, rolling out on paid tiers outside the US.',
        'Runway Characters adds real-time avatars you can interact with; Runway notes API availability for integrating characters into products and workflows.',
        'Creator stack expansion also includes audio tooling (TTS plus SFX / speech-to-speech apps) as a complementary capability set.'
      ],
      sourceLabel: 'Runway Changelog',
      sourceUrl: 'https://runwayml.com/changelog'
    }
  ],
  stories: [
    {
      title: 'Okta for AI Agents: centralized directory for agents + MCP servers, ownership assignment, lifecycle workflows, and a “kill switch”',
      tag: 'enterprise',
      sourceLabel: 'Okta',
      sourceUrl: 'https://www.okta.com/products/govern-ai-agent-identity/'
    },
    {
      title: 'LM Studio changelog: tighter OpenAI-/Anthropic-compatible local APIs (tool-call error surfacing, reasoning options, schema parsing fixes)',
      tag: 'harmony',
      sourceLabel: 'LM Studio Changelog',
      sourceUrl: 'https://lmstudio.ai/changelog'
    },
    {
      title: 'OpenAI publishes “open models” page for gpt-oss-120b / gpt-oss-20b with Apache 2.0 licensing',
      tag: 'harmony',
      sourceLabel: 'OpenAI',
      sourceUrl: 'https://openai.com/open-models/'
    },
    {
      title: 'AppFolio 2026 benchmark report: “AI-native” users pull ahead; highlights a trust gap for AI features in legacy property-management systems',
      tag: 'groove',
      sourceLabel: 'AppFolio Newsroom',
      sourceUrl: 'https://www.appfolio.com/newsroom/property-manager-benchmark-survey-2026'
    },
    {
      title: 'OpenADR press releases: DLMS UA + OpenADR Alliance liaison targets interoperable, standards-based smart meter data exchange at the grid edge',
      tag: 'harmony',
      sourceLabel: 'OpenADR Alliance',
      sourceUrl: 'https://www.openadr.org/press-releases'
    },
    {
      title: 'Yardi press release: REfresh Virtual highlights Yardi Virtuoso Assistant and other AI-enabled resident/operations experiences',
      tag: 'groove',
      sourceLabel: 'Yardi',
      sourceUrl: 'https://www.yardi.com/news/press-releases/refresh-virtual-returns-with-an-extra-day/'
    }
  ]
};



/* render-fix v1 — TAG_META + bullets */
const TAG_META = {
  groove:     { label: 'GrooveGrid',              pillClass: 'pill-groove',     cardClass: 'spotlight-flux'      },
  harmony:    { label: 'HarmonyGrid',             pillClass: 'pill-harmony',    cardClass: 'spotlight-harmony'   },
  both:       { label: 'GrooveGrid + HarmonyGrid',pillClass: 'pill-both',       cardClass: 'spotlight-both'      },
  enterprise: { label: 'Enterprise',              pillClass: 'pill-enterprise', cardClass: 'spotlight-enterprise'},
  bonus:      { label: 'Bonus',                   pillClass: 'pill-bonus',      cardClass: 'spotlight-bonus'     }
};

function escapeHTML(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function pill(tag) {
  const m = TAG_META[tag] || TAG_META.enterprise;
  return `<span class="pill ${m.pillClass}">${escapeHTML(m.label)}</span>`;
}

function externalIcon() {
  return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`;
}

/* ── Date ──────────────────────────────────────────────────────────────── */
(function () {
  try {
    const d = new Date(REPORT.date + 'T12:00:00');
    const fmt = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const el = document.getElementById('report-date');
    if (el) el.textContent = fmt;
  } catch (e) { /* non-fatal */ }
})();

/* ── Spotlights ────────────────────────────────────────────────────────── */
const spotlightsAll = (REPORT && Array.isArray(REPORT.spotlights)) ? REPORT.spotlights : [];
const visibleSpotlights = spotlightsAll.filter((s, i) => {
  if (s && s.bonus) return true;
  return i < 4;  // safety cap; matches README 'hard cap 4'
});

function spotlightCard(s) {
  const m = TAG_META[s.tag] || TAG_META.enterprise;
  const heading = escapeHTML(s.title || s.headline || '(untitled)');
  const bulletsArr = Array.isArray(s.bullets) ? s.bullets : (s.summary ? [s.summary] : []);
  const bulletsHTML = bulletsArr.length
    ? `<ul class="bullets">${bulletsArr.map(b => `<li>${escapeHTML(b)}</li>`).join('')}</ul>`
    : '';
  const sourceLabel = escapeHTML(s.sourceLabel || 'Source');
  const sourceUrl   = String(s.sourceUrl || '#');
  return `
    <div class="card ${m.cardClass}">
      <div class="card-header">
        <h2>${heading}</h2>
        ${pill(s.tag)}
      </div>
      ${bulletsHTML}
      <div class="card-footer">
        <span class="relevance">${escapeHTML(s.relevance || '')}</span>
        <a class="source-link" href="${sourceUrl}" target="_blank" rel="noopener">
          ${externalIcon()} ${sourceLabel}
        </a>
      </div>
    </div>`;
}

(function () {
  const grid = document.getElementById('spotlight-grid');
  if (!grid) return;
  if (visibleSpotlights.length === 0) {
    grid.innerHTML = `<div class="empty">No spotlights for today.</div>`;
  } else {
    grid.innerHTML = visibleSpotlights.map(spotlightCard).join('');
  }
})();

/* ── Stories ───────────────────────────────────────────────────────────── */
function storyRow(s) {
  const title = escapeHTML(s.title || s.headline || '(untitled)');
  const summary = escapeHTML(s.summary || '');
  const sourceLabel = escapeHTML(s.sourceLabel || 'Source');
  const sourceUrl   = String(s.sourceUrl || '#');
  const summaryHTML = summary ? `<div class="story-summary">${summary}</div>` : '';
  return `
    <div class="story-item">
      <div class="story-pill">${pill(s.tag)}</div>
      <div class="story-body">
        <div class="story-title">${title}</div>
        ${summaryHTML}
      </div>
      <a class="story-source" href="${sourceUrl}" target="_blank" rel="noopener">
        ${externalIcon()} ${sourceLabel}
      </a>
    </div>`;
}

(function () {
  const list = document.getElementById('story-list');
  if (!list) return;
  const stories = (REPORT && Array.isArray(REPORT.stories)) ? REPORT.stories : [];
  if (stories.length === 0) {
    list.innerHTML = `<div class="empty">No additional stories today.</div>`;
  } else {
    list.innerHTML = stories.map(storyRow).join('');
  }
})();

/* ── Footer count ──────────────────────────────────────────────────────── */
(function () {
  const el = document.getElementById('footer-count');
  if (!el) return;
  const s = visibleSpotlights.length;
  const t = (REPORT && Array.isArray(REPORT.stories)) ? REPORT.stories.length : 0;
  el.textContent = `${s} spotlight${s !== 1 ? 's' : ''} · ${t} stories`;
})();
</script>
</body>
</html>
