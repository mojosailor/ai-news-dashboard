<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Intel — Prevwind</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3149;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --groove: #22c55e;
    --groove-bg: rgba(34,197,94,0.10);
    --groove-border: rgba(34,197,94,0.30);
    --harmony: #818cf8;
    --harmony-bg: rgba(129,140,248,0.10);
    --harmony-border: rgba(129,140,248,0.30);
    --both: #38bdf8;
    --both-bg: rgba(56,189,248,0.10);
    --both-border: rgba(56,189,248,0.30);
    --enterprise: #fb923c;
    --enterprise-bg: rgba(251,146,60,0.10);
    --enterprise-border: rgba(251,146,60,0.30);
    --bonus: #f472b6;
    --bonus-bg: rgba(244,114,182,0.10);
    --bonus-border: rgba(244,114,182,0.30);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .archive-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .archive-link:hover {
    color: var(--text);
    border-color: var(--both-border);
    background: var(--both-bg);
  }
  .archive-banner {
    max-width: 1100px;
    margin: -8px auto 20px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--bonus);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
  }
  #report-date {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Section labels ─────────────────────── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Spotlights grid ────────────────────── */
  .spotlights {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #3e4265; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .pill {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* pill variants */
  .pill-groove    { background: var(--groove-bg);     color: var(--groove);     border: 1px solid var(--groove-border); }
  .pill-harmony   { background: var(--harmony-bg);    color: var(--harmony);    border: 1px solid var(--harmony-border); }
  .pill-both      { background: var(--both-bg);       color: var(--both);       border: 1px solid var(--both-border); }
  .pill-enterprise{ background: var(--enterprise-bg); color: var(--enterprise); border: 1px solid var(--enterprise-border); }
  .pill-bonus     { background: var(--bonus-bg);      color: var(--bonus);      border: 1px solid var(--bonus-border); }

  /* spotlight card accent stripe */
  .card.spotlight-flux      { border-top: 3px solid var(--groove); }
  .card.spotlight-harmony   { border-top: 3px solid var(--harmony); }
  .card.spotlight-both      { border-top: 3px solid var(--both); }
  .card.spotlight-enterprise{ border-top: 3px solid var(--enterprise); }
  .card.spotlight-bonus     { border-top: 3px solid var(--bonus); }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: #b0b4cc;
    line-height: 1.65;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    gap: 8px;
  }

  .relevance {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .source-link:hover { color: var(--text); }
  .source-link svg { flex-shrink: 0; }

  /* ── More stories ───────────────────────── */
  .more-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  .story-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .story-item {
    background: var(--surface);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: start;
    gap: 12px;
    transition: background 0.12s;
  }

  .story-item:hover { background: var(--surface2); }

  .story-pill { margin-top: 2px; }

  .story-body { min-width: 0; }

  .story-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .story-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
  }

  .story-source {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
    margin-top: 3px;
    transition: color 0.15s;
  }

  .story-source:hover { color: var(--text); }

  /* ── Empty / error states ───────────────── */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Footer ─────────────────────────────── */
  footer {
    max-width: 1100px;
    margin: 40px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Daily AI Intel</h1>
    <span>Prevwind · Project Flux · Archived</span>
  </div>
  <div class="header-right">
    <a class="archive-link" href="../" title="Back to latest">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Latest
    </a>
    <a class="archive-link" href="index.html" title="Browse archive">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      Archive
    </a>
    <div id="report-date"></div>
  </div>
</header>

<div class="archive-banner">
  Viewing archived report. <a href="../" style="color:var(--both)">Go to today's dashboard</a> or <a href="index.html" style="color:var(--both)">browse all archives</a>.
</div>

<!-- ── Spotlight section ──────────────────────── -->
<div class="section-label" style="max-width:1100px;margin:0 auto 12px;">Spotlights</div>
<div class="spotlights" id="spotlight-grid"></div>

<!-- ── More stories ──────────────────────────── -->
<div class="more-section">
  <div class="section-label">More Stories</div>
  <div class="story-list" id="story-list"></div>
</div>

<footer>
  <span>Auto-generated · Prevwind internal</span>
  <span id="footer-count"></span>
</footer>

<!-- ═══════════════════════════════════════════════
     DATA — edit this object to update the report
     ════════════════════════════════════════════ -->
<script>
/*
  TAG values:
    "groove"      → [GrooveGrid]
    "harmony"     → [HarmonyGrid]
    "both"        → [GrooveGrid + HarmonyGrid]
    "enterprise"  → General Enterprise
    "bonus"       → Bonus (rare 3rd spotlight, big-news days only)

  Set bonus:true on a spotlight to show it as the optional 3rd card.
  If bonus:true but you only want 2, simply remove the entry.
*/
const REPORT = {
  date: "2026-04-26",

  spotlights: [
    {
      tag: "harmony",
      headline: "VPP scale hits 37.5 GW in North America — and policy is starting to treat demand flexibility as capacity",
      summary: "Wood Mackenzie estimates North American virtual power plant capacity reached 37.5 GW in 2025 (up 13.7% YoY), while PJM raised demand-side resource ELCC to 92% for the 2027–28 capacity auction — a quiet signal that flexibility is being priced like generation. The trendline: utilities and grid operators want bigger, more dispatchable portfolios (not one-off pilots), which is pushing aggregators toward better forecasting, verification, and tighter wholesale-local coordination.",
      relevance: "HarmonyGrid narrative: VPPs are now large enough that building-level submetering + controllable loads can be packaged as an investable capacity product. Pilot ask: identify 3–5 properties where you can prove repeatable peak reductions and measurement/verification, then sell that reliability upstream.",
      sourceLabel: "Utility Dive",
      sourceUrl: "https://www.utilitydive.com/news/in-2026-virtual-power-plants-must-scale-or-risk-being-left-behind/810321/",
    },
    {
      tag: "enterprise",
      headline: "Microsoft Foundry Toolkit for VS Code reaches GA — agent templates, local traces, and one-click deploy to Foundry Agent Service",
      summary: "Microsoft shipped Foundry Toolkit for VS Code as generally available, adding IDE workflows for its Agent Framework: start an agent from templates (or via GitHub Copilot), run/test locally with visualization + traces, and deploy directly to Foundry Agent Service from inside VS Code.",
      relevance: "Enterprise pilot pattern: standardize 'agent dev' like app dev. The big unlock isn’t a new model — it’s repeatable engineering (templates, traces, deploy target) that makes governance and incident response feasible when agents start behaving like internal services.",
      sourceLabel: "Microsoft Azure Updates",
      sourceUrl: "https://azure.microsoft.com/updates?id=560987",
    },
    {
      tag: "harmony",
      bonus: true,
      headline: "OpenADR spotlights 'OpenADR 3 price signals + local AI' to automate buildings — NuCoreAI pitch is an edge VPP plugin",
      summary: "In an OpenADR Alliance webinar, Universal Devices CEO Michel Kohanim presented NuCoreAI as an open-source, low-cost, edge-based AI plugin that interprets optimization logic in plain English and executes control strategies across devices/protocols using OpenADR 3 price signals.",
      relevance: "This is the 'local brain' pattern HarmonyGrid should watch: price signals in, optimized control out, without cloud dependency. If it works, it lowers the integration barrier for smaller buildings to join VPP/DR programs.",
      sourceLabel: "OpenADR Alliance",
      sourceUrl: "https://www.openadr.org/webinar-series",
    },
    {
      tag: "enterprise",
      bonus: true,
      headline: "Identity for agents is becoming mandatory: enterprises are treating AI agents like employees with lifecycle + just-in-time permissions",
      summary: "A Fortune analysis argues that human-centric governance is failing for autonomous agents; it highlights the need to treat agents as distinct identities with scoped, time-bound permissions, continuous monitoring, and step-up authorization for risky actions.",
      relevance: "This is the missing control plane for 'agent everywhere' roadmaps. Pair an agent framework with an identity-first policy layer (inventory, ownership, permission boundaries, audit trails) before scaling beyond a few workflows.",
      sourceLabel: "Fortune",
      sourceUrl: "https://fortune.com/2026/04/13/ai-agents-governance-identity-risk-okta/",
    },
  ],

  stories: [
    {
      tag: "harmony",
      title: "Grid-edge trend watch: Piclo's flexibility marketplace passes 100+ aggregators/asset owners and plans more state expansion in 2026",
      summary: "Utility Dive notes Piclo launched its Massachusetts flexibility marketplace in July 2025, has over 100 aggregators and asset owners, and plans expansion into additional states in 2026 — a signal that standardized procurement is emerging alongside VPP growth.",
      sourceLabel: "Utility Dive",
      sourceUrl: "https://www.utilitydive.com/news/in-2026-virtual-power-plants-must-scale-or-risk-being-left-behind/810321/",
    },
    {
      tag: "enterprise",
      title: "For researchers: practical agent governance is converging on three questions — where are agents, what can they connect to, what can they do",
      summary: "Fortune frames a simple governance checklist for an 'agentic enterprise': inventory agents, constrain connections/permissions (ideally just-in-time), and make authorization/auditability provable for regulators and incident response.",
      sourceLabel: "Fortune",
      sourceUrl: "https://fortune.com/2026/04/13/ai-agents-governance-identity-risk-okta/",
    },
    {
      tag: "harmony",
      title: "Self-hosting trend watch: April's open-weight wave keeps accelerating (Gemma 4, GLM-5.1 weights, MiniMax M2.7 weights, Qwen3.6-A3B)",
      summary: "A mid-April roundup argues April 2026 delivered multiple major open-weight releases and calls out Gemma 4, GLM-5.1 open weights, MiniMax M2.7 weights, and Qwen3.6-35B-A3B as headline models for teams building local or self-hosted stacks.",
      sourceLabel: "ModemGuides",
      sourceUrl: "https://www.modemguides.com/blogs/ai-infrastructure/best-open-source-llms-hardware-april-2026",
    },
    {
      tag: "bonus",
      title: "Creator tools: 2026 video models keep iterating on realism + continuity (Seedance 2.0, Kling 3.0, Veo, Sora)",
      summary: "Magic Hour’s 2026 tracker highlights confirmed updates including Seedance 2.0 (longer, more cinematic sequences), Kling 3.0 (better physics and human motion stability), Veo updates (prompt interpretation + quality), and Sora improvements (narrative continuity and scene transitions).",
      sourceLabel: "Magic Hour",
      sourceUrl: "https://magichour.ai/blog/ai-video-model-release-tracker-2026",
    },
    {
      tag: "groove",
      title: "Real-estate workflows: a 2026 survey of 'AI agents for real estate' centers on listing generation, tenant engagement, and maintenance automation",
      summary: "A February 2026 overview of AI agents in real estate highlights common adoption patterns: automated listing/marketing content, tenant communication, lead qualification, and maintenance triage — a checklist for what property managers now expect from modern platforms.",
      sourceLabel: "Kanerika",
      sourceUrl: "https://kanerika.com/blogs/ai-for-real-estate/",
    },
    {
      tag: "bonus",
      title: "Creator tools: 2026 AI music stacks are consolidating around Suno plus a fast-growing set of competitors",
      summary: "A 2026 workflow roundup lists Suno as a leading AI music generator and calls out MiniMax’s Music-2.0 as a notable competitor, reflecting rapid iteration in prompt-to-song tooling.",
      sourceLabel: "Curious Refuge",
      sourceUrl: "https://curiousrefuge.com/blog/best-ai-music-tools-for-2026",
    },
  ],
};
// ────────────────────────────────────────────────────────────────────────────

/* ── Render helpers ─────────────────────────────────────────────────────── */
const TAG_META = {
  groove:     { label: "GrooveGrid",              pillClass: "pill-groove",     cardClass: "spotlight-flux" },
  harmony:    { label: "HarmonyGrid",             pillClass: "pill-harmony",    cardClass: "spotlight-harmony" },
  both:       { label: "GrooveGrid + HarmonyGrid",pillClass: "pill-both",       cardClass: "spotlight-both" },
  enterprise: { label: "Enterprise",              pillClass: "pill-enterprise", cardClass: "spotlight-enterprise" },
  bonus:      { label: "Bonus",                   pillClass: "pill-bonus",      cardClass: "spotlight-bonus" },
};

function pill(tag) {
  const m = TAG_META[tag] || TAG_META.enterprise;
  return `<span class="pill ${m.pillClass}">${m.label}</span>`;
}

function externalIcon() {
  return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`;
}

/* ── Date ──────────────────────────────────────────────────────────────── */
const d = new Date(REPORT.date + "T12:00:00");
const fmt = d.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
document.getElementById("report-date").textContent = fmt;

/* ── Spotlights ────────────────────────────────────────────────────────── */
const grid = document.getElementById("spotlight-grid");
const visibleSpotlights = REPORT.spotlights.filter((s, i) => {
  if (s.bonus) return true;   // bonus cards always show if present
  return i < 2;               // cap at 2 non-bonus spotlights
});

if (visibleSpotlights.length === 0) {
  grid.innerHTML = `<div class="empty">No spotlights for today.</div>`;
} else {
  visibleSpotlights.forEach(s => {
    const m = TAG_META[s.tag] || TAG_META.enterprise;
    grid.innerHTML += `
      <div class="card ${m.cardClass}">
        <div class="card-header">
          <h2>${s.headline}</h2>
          ${pill(s.tag)}
        </div>
        <p>${s.summary}</p>
        <div class="card-footer">
          <span class="relevance">${s.relevance || ""}</span>
          <a class="source-link" href="${s.sourceUrl}" target="_blank" rel="noopener">
            ${externalIcon()} ${s.sourceLabel}
          </a>
        </div>
      </div>`;
  });
}

/* ── Stories ───────────────────────────────────────────────────────────── */
const list = document.getElementById("story-list");
if (!REPORT.stories || REPORT.stories.length === 0) {
  list.innerHTML = `<div class="empty">No additional stories today.</div>`;
} else {
  REPORT.stories.forEach(s => {
    list.innerHTML += `
      <div class="story-item">
        <div class="story-pill">${pill(s.tag)}</div>
        <div class="story-body">
          <div class="story-title">${s.title}</div>
          <div class="story-summary">${s.summary}</div>
        </div>
        <a class="story-source" href="${s.sourceUrl}" target="_blank" rel="noopener">
          ${externalIcon()} ${s.sourceLabel}
        </a>
      </div>`;
  });
}

/* ── Footer count ──────────────────────────────────────────────────────── */
const total = visibleSpotlights.length + (REPORT.stories?.length || 0);
document.getElementById("footer-count").textContent =
  `${visibleSpotlights.length} spotlight${visibleSpotlights.length !== 1 ? "s" : ""} · ${REPORT.stories?.length || 0} stories`;
</script>
</body>
</html>
